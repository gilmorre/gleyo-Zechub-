<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partnership Button</title>
  <style>
    body {
      background-color: #1e1e2f;
    }
    

    .partner-root,
    .parnership-popup-container {
    width: 100% !important;
    box-sizing: border-box;
    


    }

    .outer-box.partner-root{
    width: 100% !important;

    }

 

 

/* ✅ Proper mobile override */
@media (max-width: 991px) {
  .partner-root,
  .parnership-popup-container {
    width: 100% !important;
    max-width: 100% !important;
  }
}

    /* Outer container */
    .partner-root {
      position: relative;
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 50px 20px 20px;
      text-align: center;
    }

    /* Floating label above */
    .partner-label {
      background: linear-gradient(90deg, #4a00e0, #8e2de2);
      position: absolute;
      top: -16px;
      left: 20px;
      color: white;
      font-size: 14px;
      padding: 6px 16px;
      border-radius: 50px;
      display: flex;
      align-items: center;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    .partner-label i {
      margin-right: 6px;
    }

    /* Join button */
    .partner-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(90deg, #4a00e0, #8e2de2);
      color: white;
      font-size: 16px;
      font-weight: bold;
      border-radius: 20px;
      padding: 14px;
      text-decoration: none;
      transition: background 0.3s ease;
      margin-top: 16px;
    }

    .partner-btn:hover {
      background: linear-gradient(90deg, #5e17eb, #9b30f2);
    }

    /* Profile circle */
    .partnerCircle {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(90deg, #4a00e0, #8e2de2);
      margin: 0 auto 8px;
      position: relative;
      overflow: hidden;
    }

    .partnerCircle img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
      display: none; /* hide image by default */
    }

    /* Fix spacing for title + description */
    .community_name {
      color: #fff;
      margin: 6px 0 4px;
      font-size: 1.1rem;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .description-parnership {
      color: #c9c7c7;
      font-size: 14px;
      margin: 4px 0 0;
    }

    /* Popup container */
    .popup-container {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 18px;
      padding: 20px 20px 30px;
      position: relative;
      color: white;
      margin-top: 24px;
    }

    /* Upward arrow above container */
    .popup-container::before {
      content: "";
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-bottom: 12px solid #222;
    }

    .popup-header {
      display: flex;
      align-items: center;
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 16px;
      gap: 10px;
    }

    .popup-header .partner-icon {
      background: linear-gradient(90deg, #4a00e0, #8e2de2);
      padding: 6px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .popup-header .partner-icon i {
      color: white;
      font-size: 18px;
    }

    .popup-actions {
      margin-left: auto;
      display: flex;
      gap: 15px;
    }

    .popup-actions button {
      background: transparent;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 18px;
    }

    .popup-actions button:hover {
      color: white;
    }

    label {
      font-size: 0.7rem;
      margin-top: 23px;
      display: block;
      margin-bottom: 6px;
    }

    /* Input wrapper */
    .input-wrapper {
      display: flex;
      align-items: center;
      width: 90%;
      margin-left: 6px;
      border: 1.5px solid #555;
      border-radius: 14px;
      background: #121212;
      overflow: hidden;
    }

    .partner-input {
      flex: 1;
      padding: 10px 14px;
      border: none;
      background: transparent;
      color: white;
      font-size: 1rem;
    }

    .partner-input:focus {
      outline: none;
    }

    .error-message {
      color: #ff3b3b;
      font-size: 0.85rem;
      margin-top: 6px;
      font-weight: 600;
    }

    .liners {
      height: 0.5px;
      background-color: #8e2de2;
      border-radius: 1px;
      margin: 8px -20px;
    }
  </style>

  <input id="partnerInput" name="partner_link" class="partner-input"
       type="text" value="http://127.0.0.1:8000/" placeholder="your-path-here"/>

  <script>
document.querySelectorAll(".partner-root").forEach(root => {
  const container = root.nextElementSibling; // the popup right after each root

  const input   = container.querySelector(".partner-input");
  const prefix  = "http://127.0.0.1:8000/";

  const imgEl   = root.querySelector(".partnerCircleImg");
  const nameEl  = root.querySelector(".community_name");
  const aboutEl = root.querySelector(".description-parnership");
  const joinBtn = root.querySelector(".js-subscribe");
  const hiddenId = root.querySelector("[data-community_id]");

  let currentSlug = "";

  // Enforce prefix
  input.addEventListener("input", () => {
    if (!input.value.startsWith(prefix)) {
      const userPart = input.value.replace(prefix, "");
      input.value = prefix + userPart;
    }
  });

  // Fetch community data on blur
  input.addEventListener("blur", () => {
    const slug = input.value.replace(prefix, "").trim();
    currentSlug = slug;

    if (slug) {
      fetch(`/api/community/${slug}`)
        .then(res => res.json())
        .then(data => {
          if (data.error) {
            nameEl.textContent = "Not found";
            aboutEl.textContent = "";
            imgEl.style.display = "none";
            hiddenId.dataset.community_id = "";
            currentSlug = "";
            joinBtn.setAttribute("href", "#");
          } else {
            nameEl.textContent = data.name;
            aboutEl.textContent = data.about;
            imgEl.src = data.logo_path;
            imgEl.style.display = "block";
            hiddenId.dataset.community_id = data.id;

            // ✅ Keep join button in sync
            joinBtn.setAttribute("href", prefix + currentSlug);
          }
        })
        .catch(err => {
          console.error(err);
          joinBtn.setAttribute("href", "#");
          hiddenId.dataset.community_id = "";
        });
    } else {
      joinBtn.setAttribute("href", "#");
      hiddenId.dataset.community_id = "";
    }
  });

  // Join button click
  joinBtn.addEventListener("click", (e) => {
    if (!currentSlug) {
      e.preventDefault();
      alert("Please enter a valid community link first.");
    }
    // ✅ if href already set, it will redirect
  });

  // Prevent cursor before prefix
  input.addEventListener("focus", () => {
    setTimeout(() => {
      if (input.selectionStart < prefix.length) {
        input.setSelectionRange(prefix.length, prefix.length);
      }
    }, 0);
  });

  // Prevent deleting prefix
  input.addEventListener("keydown", (e) => {
    if ((e.key === "Backspace" || e.key === "ArrowLeft") && input.selectionStart <= prefix.length) {
      e.preventDefault();
    }
  });
});

  </script>
