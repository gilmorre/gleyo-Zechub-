      if (!backLink) return;

      const url = saved || "/";
      backLink.dataset.url = url;

      const path = url.split("?")[0];
      const parts = path.split("/").filter(Boolean);

      let label = "Home";

      const isIdLike = (str) => {
        return /^[0-9\-]+$/.test(str) || /^[0-9a-f\-]{8,}$/i.test(str) || str.length > 12;
      };

      for (let i = parts.length - 1; i >= 0; i--) {
        if (!isIdLike(parts[i])) {
          label = parts[i];
          break;
        }
      }

      label = label.replace(/-/g, " ");
      label = label.charAt(0).toUpperCase() + label.slice(1);

      const span = backLink.querySelector("span");
      if (span) {
        span.textContent = `Back to ${label}`;
      }
    });

  async function LoadDiscordInit() {
    const communityId = "{{ community.id }}";

      const cached = sessionStorage.getItem(key);
      if (cached) return JSON.parse(cached);

      const res = await fetch(url);
      const data = await res.json();
      sessionStorage.setItem(key, JSON.stringify(data));
      return data;
    };

    const rolesData = await getCached(
      "discord_roles_" + communityId,
      `/api/community/${communityId}/discord_roles`
    );

    const channelsData = await getCached(
      "discord_channels_" + communityId,
      `/api/community/${communityId}/discord_channels`
    );

    document.querySelectorAll(".smart-dd").forEach(dd => {
      const type = dd.dataset.type;

      const triggerText = dd.querySelector(".smart-dd-trigger span");
      const menu = dd.querySelector(".smart-dd-menu");
      const hiddenInput = dd.querySelector("input[type=hidden]");

    const items =
      type === "channel"
        ? (channelsData?.channels || [])
        : (rolesData?.roles || []);


      // clear menu
      menu.innerHTML = "";
  

      items.forEach(item => {
        const label =
          type === "channel"
            ? `# ${item.name}`
            : `${item.name.startsWith("@") ? "" : "@"}${item.name}`;

        const div = document.createElement("div");
        div.className = "smart-dd-item";
        div.textContent = label;
        div.dataset.id = item.id;

      div.onclick = async () => {
        hiddenInput.value = item.id;
        triggerText.textContent = label;
        dd.classList.remove("open");

        const card = dd.closest(".notify-card");
        const checkbox = card.querySelector(".notify-switch input");
        const notifType = checkbox.name.replace("_enabled", "");

        const payload = {
          type: notifType,
          enabled: checkbox.checked
        };

        if (type === "channel") {
          payload.channel_id = item.id;
        } else {
          payload.role_id = item.id;
        }

        await fetch(
          `/api/community/{{ community_slug }}/discord/notification`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-CSRFToken": csrfToken
            },
            body: JSON.stringify(payload)
          }
        );
      };

        menu.appendChild(div);

        // restore selected
        if (selectedId && selectedId == item.id) {
          hiddenInput.value = item.id;
          triggerText.textContent = label;
        }
      });

          if (o !== dd) o.classList.remove("open", "drop-up", "drop-down");
        });

        const menu = dd.querySelector(".smart-dd-menu");

        // Temporarily show to measure
        menu.style.visibility = "hidden";
        menu.style.display = "block";

        const triggerRect = dd.getBoundingClientRect();
        const menuHeight = menu.offsetHeight;
        const viewportHeight = window.innerHeight;

        // reset temp styles
        menu.style.display = "";
        menu.style.visibility = "";

        const spaceBelow = viewportHeight - triggerRect.bottom;
        const spaceAbove = triggerRect.top;

        dd.classList.remove("drop-up", "drop-down");

        if (spaceBelow < menuHeight && spaceAbove > menuHeight) {
          dd.classList.add("drop-up");
        } else {
          dd.classList.add("drop-down");
        }

        dd.classList.toggle("open");
      };

    });

  function saveWebhook(panel) {
    const urlInput = panel.querySelector(".webhook-url");
    const raw = urlInput.value.trim();

    if (!raw) {
      showError("Webhook URL required");
      return;
    }

    let url;
    try {
      url = new URL(raw);
    } catch {
      showError("Invalid URL format");
      return;
    }

    if (!["http:", "https:"].includes(url.protocol)) {
      showError("Webhook URL must start with http:// or https://");
      return;
    }

    if (
      url.hostname === "localhost" ||
      url.hostname.startsWith("127.") ||
      url.hostname.startsWith("10.") ||
      url.hostname.startsWith("192.168.") ||
      url.hostname.endsWith(".local")
    ) {
      showError("Local or private URLs are not allowed");
      return;
    }

    fetch("/api/community/webhooks", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": csrfToken
      },
      body: JSON.stringify({
        community_slug: "{{ community_slug }}",
        endpoint_url: url.href
      })
    })
    .then(r => r.json())
    .then(data => {
      if (!data.success) {
        showError(data.error || "Failed to save webhook");
        return;
      }

      const wrapper = document.getElementById("webhookWrapper");
      const createUI = document.getElementById("webhookCreateUI");
      const manageUI = document.getElementById("webhookManageUI");

      wrapper.dataset.webhookId = data.webhook.id;
      manageUI.querySelector(".webhook-url").value = data.webhook.endpoint_url;
      document.getElementById("webhookSecret").value = data.webhook.secret;

      createUI.classList.replace("webhook-visible", "webhook-hidden");
      manageUI.classList.replace("webhook-hidden", "webhook-visible");

      showSuccess("Webhook saved 🎉");
    })
    .catch(() => {
      showError("Network error. Please try again.");
    });
  }

  async function updateEmojiName(input) {
    const card = input.closest(".emoji-card");
    if (!card) return;

    const emojiId = card.dataset.emojiId;
    let newName = input.value.trim();

    // ✅ Only letters, numbers, underscore
    newName = newName.replace(/[^a-zA-Z0-9_]/g, "");

    if (!newName) {
      alert("Emoji name cannot be empty or invalid.");
      input.value = card.dataset.originalName || "";
      return;
    }

    try {
      const res = await fetch(
        `/api/communities/{{ community_slug }}/emojis/${emojiId}`,
        {
          method: "PATCH",
          headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": csrfToken
          },
          body: JSON.stringify({ name: newName })
        }
      );

      if (!res.ok) {
        const data = await res.json();
        alert(data.error || "Failed to update emoji name");
        input.value = card.dataset.originalName || "";
        return;
      }

      // ✅ Save new name in data attribute
      card.dataset.originalName = newName;

      // ✅ Update input display with colons
      input.value = `:${newName}:`;

    } catch (err) {
      console.error("Emoji name update failed:", err);
      input.value = card.dataset.originalName || "";
    }
  }

    function captureBaselineFromDOM() {

        initialState.hours = Number(activeDuration.dataset.hours);
        return;
      }

      if (manualBox.classList.contains("active")) {
        initialState.type = "manual";
        initialState.hours = null;
        return;
      }

      // nothing disabled
      initialState.type = null;
      initialState.hours = null;
    }


    const activeDuration = document.querySelector(".duration-btn.active");
    const manualActive = manualBox.classList.contains("active");

    if (activeDuration) {
      initialState.type = "temporary";
      initialState.hours = Number(activeDuration.dataset.hours);
    }

    if (manualActive) {
      initialState.type = "manual";
      initialState.hours = null;
    }

    function isSameAsInitial(type, hours) {
      return (
        initialState.type === type &&
        initialState.hours === hours
      );
    }

    /* -------------------------
      helpers
    ------------------------- */
    function clearActionOnly() {
      selection.type = null;
      selection.hours = null;
      disableAction();
    }

    function enableAction() {
      actionBtn.classList.add("active");
      actionBtn.disabled = false;
    }

    function disableActionIfNotEnableMode() {
      if (actionBtn.classList.contains("enable")) return; // 🚫 do nothing
      actionBtn.classList.remove("active");
      actionBtn.disabled = true;
    }

    function syncActionButton(type, hours) {
      const isBaseline =
        initialState.type === type &&
        initialState.hours === hours;

      if (isBaseline && initialState.type !== null) {
        actionBtn.textContent = "Enable Ticket System";
        actionBtn.classList.add("active", "enable");
        actionBtn.disabled = false;
      } else {
        actionBtn.textContent = "Disable Ticket System";
        actionBtn.classList.remove("enable");
        actionBtn.classList.add("active");
        actionBtn.disabled = false;
      }
    }


    function disableAction() {
      actionBtn.classList.remove("active");
      actionBtn.disabled = true;
    }

    function clearSelections() {
      durationBtns.forEach(b => b.classList.remove("active"));
      manualBox.classList.remove("active");

      selection.type = null;
      selection.hours = null;

      disableActionIfNotEnableMode();
    }

    /* -------------------------
      selection handlers
    ------------------------- */
    function toggleDuration(btn) {
      const hours = Number(btn.dataset.hours);

      clearSelections();
      btn.classList.add("active");

      selection.type = "temporary";
      selection.hours = hours;

      syncActionButton("temporary", hours);
    }


    function toggleManual() {
      clearSelections();
      manualBox.classList.add("active");

      selection.type = "manual";
      selection.hours = null;

      syncActionButton("manual", null);
    }

    /* -------------------------
      API
    ------------------------- */

    async function disableTickets() {
      const payload = {
        community_slug: "{{ community_slug }}",
        mode: selection.type,
        hours: selection.type === "temporary" ? selection.hours : null

      };

      const res = await fetch("/api/community/tickets/disable", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": csrfToken
        },
        body: JSON.stringify(payload)
      });

      if (!res.ok) return;
      initialState.type = selection.type;
      initialState.hours = selection.hours;
      actionBtn.textContent = "Enable Ticket System";
      actionBtn.classList.add("active", "enable");
      actionBtn.disabled = false;

    }


    /* -------------------------
      listeners
    ------------------------- */

    durationBtns.forEach(btn => {
      btn.addEventListener("click", () => toggleDuration(btn));
    });

    manualBox.addEventListener("click", toggleManual);

    cancelBtn?.addEventListener("click", clearSelections);

    actionBtn.addEventListener("click", () => {
      if (!actionBtn.classList.contains("active")) return;

      // ENABLE FLOW
      if (actionBtn.textContent.toLowerCase().includes("enable")) {
        openModal(
          "Enable ticket system",
          "Tickets will become visible and accessible again.",
          enableTickets
        );
        return;
      }

      // DISABLE FLOW
      if (!selection.type) return;

      const message =
        selection.type === "manual"
          ? "Tickets will stay disabled until you manually re-enable them. Existing tickets are preserved."
          : `Tickets will be disabled for ${selection.hours} hour(s). Existing tickets are preserved.`;

      openModal(
        "Disable ticket system",
        message,
        disableTickets
      );
    });


    async function enableTickets() {
      const res = await fetch("/api/community/tickets/enable", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": csrfToken
        },
        body: JSON.stringify({
          community_slug: "{{ community_slug }}"
        })
      });

      if (!res.ok) return;
      initialState.type = null;
      initialState.hours = null;

      // 🔥 exit ENABLE mode
      actionBtn.textContent = "Disable Ticket System";
      actionBtn.classList.remove("enable");
      actionBtn.disabled = true;
      actionBtn.classList.remove("active"); 

      clearSelections();
    }


    /* -------------------------
      init
    ------------------------- */

    // If Flask already rendered it active → respect it
    if (actionBtn.classList.contains("active")) {
      actionBtn.disabled = false;
    } else {
      disableAction();
    }

    const modal = document.getElementById("ticketConfirmModal");
    const modalTitle = document.getElementById("modalTitle");
    const modalMessage = document.getElementById("modalMessage");
    const modalConfirm = document.getElementById("modalConfirm");
    const modalCancel = document.getElementById("modalCancel");

    function openModal(title, message, onConfirm) {
      modalTitle.textContent = title;
      modalMessage.textContent = message;

      modal.classList.add("show");

      modalConfirm.onclick = async () => {
        modal.classList.remove("show");
        await onConfirm();
      };

      modalCancel.onclick = () => {
        modal.classList.remove("show");
      };
    }

    captureBaselineFromDOM();

  }

  function clamp(v) {
    return Math.min(1, Math.max(0, v));
  }

  function hsvToHex(h, s, v) {
    let f = (n, k = (n + h / 60) % 6) =>
      v - v * s * Math.max(Math.min(k, 4 - k, 1), 0);
    return (
      "#" +
      [f(5), f(3), f(1)]
        .map(x => Math.round(x * 255).toString(16).padStart(2, "0"))
        .join("")
    );
  }

  function hexToHsv(hex) {
    let r = parseInt(hex.slice(1, 3), 16) / 255;
    let g = parseInt(hex.slice(3, 5), 16) / 255;
    let b = parseInt(hex.slice(5, 7), 16) / 255;

    let max = Math.max(r, g, b),
        min = Math.min(r, g, b),
        d = max - min,
        h;

    if (d === 0) h = 0;
    else if (max === r) h = ((g - b) / d) % 6;
    else if (max === g) h = (b - r) / d + 2;
    else h = (r - g) / d + 4;

    h = Math.round(h * 60);
    if (h < 0) h += 360;

    return {
      h,
      s: max === 0 ? 0 : d / max,
      v: max
    };
  }

  function autoSizeInput(input, max = 320) {
    const mirror = document.createElement("span");

    mirror.style.position = "absolute";
    mirror.style.visibility = "hidden";
    mirror.style.whiteSpace = "pre";
    mirror.style.font = getComputedStyle(input).font;
    mirror.style.padding = getComputedStyle(input).padding;

    document.body.appendChild(mirror);

    const resize = () => {
      mirror.textContent = input.value || " ";
      const w = mirror.offsetWidth + 2;
      input.style.width = Math.min(w, max) + "px";
    };

    resize();
    input.addEventListener("input", resize);

    return () => mirror.remove();
  }




  function openAdvancedColorPicker({
    color,
    title = "Color",
    roleId = null,
    roleSlug = null,
    onPreview,
    onCommit,
    onCancel
  }) {
  title = title.trim();

    
    const existing = document.querySelector(".advanced-color-modal");

    let previewColor = color;

    modal.innerHTML = `

          class="ac-role"

          maxlength="20"
          spellcheck="false"
          data-role-id="${roleId || ""}"
          value="${title}"
          ${editable ? "" : "disabled"}
          style="color:${color};border-color:${color}"
        />
      </div>


        <div class="ac-body">
          <div class="ac-picker">
            <div class="ac-sv">
              <div class="ac-sv-cursor"></div>
            </div>
            <div class="ac-hue">
              <div class="ac-hue-cursor"></div>
            </div>
          </div>

          <input class="ac-hex" maxlength="7" />
        </div>

        <div class="ac-footer">
          <button class="ac-cancel">Cancel</button>
          <button class="ac-done">Done</button>
        </div>

      </div>
    `;

    document.body.appendChild(modal);
    document.body.style.overflow = "hidden";

    const sv = modal.querySelector(".ac-sv");
    const hueBar = modal.querySelector(".ac-hue");
    const svCursor = modal.querySelector(".ac-sv-cursor");
    const hueCursor = modal.querySelector(".ac-hue-cursor");
    const hexInput = modal.querySelector(".ac-hex");

    let { h, s, v } = hexToHsv(color);
    updateUI();

    // ===== SV PICKER =====
    sv.addEventListener("pointerdown", e => {
      sv.setPointerCapture(e.pointerId);
      updateSV(e);
      sv.onpointermove = updateSV;
      sv.onpointerup = () => (sv.onpointermove = null);
    });

    function updateSV(e) {
      const r = sv.getBoundingClientRect();
      s = clamp((e.clientX - r.left) / r.width);
      v = clamp(1 - (e.clientY - r.top) / r.height);
      updateUI();
    }

    // ===== HUE SLIDER =====
    hueBar.addEventListener("pointerdown", e => {
      hueBar.setPointerCapture(e.pointerId);
      updateHue(e);
      hueBar.onpointermove = updateHue;
      hueBar.onpointerup = () => (hueBar.onpointermove = null);
    });


  const roleEl = modal.querySelector(".ac-role");
  let editedName = title;
  roleEl.value = roleEl.value.trim();
  // 🔥 THIS LINE IS REQUIRED
  autoSizeInput(roleEl);

  if (editable) {
    roleEl.addEventListener("input", () => {
      editedName = roleEl.value.trim();
    });

    roleEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") e.preventDefault();
    });
  }




    function updateHue(e) {
      const r = hueBar.getBoundingClientRect();
      h = clamp((e.clientX - r.left) / r.width) * 360;
      updateUI();
    }

    // ===== HEX INPUT =====
    hexInput.value = color.toUpperCase();

    hexInput.addEventListener("keydown", (e) => {
      // Prevent deleting #
      if (
        (e.key === "Backspace" && hexInput.selectionStart === 1) ||
        (e.key === "Delete" && hexInput.selectionStart === 0)
      ) {
        e.preventDefault();
      }
    });

    // HARD FILTER INPUT
    hexInput.addEventListener("input", () => {
      let value = hexInput.value.toUpperCase();

      // Always start with #
      if (!value.startsWith("#")) value = "#" + value.replace("#", "");

      // Remove non-hex chars
      value = "#" + value
        .slice(1)
        .replace(/[^0-9A-F]/g, "")
        .slice(0, 6);

      hexInput.value = value;

      // Only update picker if full hex
      if (value.length === 7) {
        ({ h, s, v } = hexToHsv(value));
        updateUI(false);
      }
    });


    function updateUI(updateHex = true) {
      const hex = hsvToHex(h, s, v);
      previewColor = hex;

      sv.style.background = `
        linear-gradient(to top, black, transparent),
        linear-gradient(to right, white, transparent),
        hsl(${h},100%,50%)
      `;

      svCursor.style.left = `${s * 100}%`;
      svCursor.style.top = `${(1 - v) * 100}%`;
      hueCursor.style.left = `${(h / 360) * 100}%`;

      modal.querySelector(".ac-role").style.color = hex;
      modal.querySelector(".ac-role").style.borderColor = hex;

      if (updateHex) hexInput.value = hex;


    }

    function close() {
      modal.remove();
      document.body.style.overflow = "";
    }

    modal.querySelector(".ac-done").onclick = () => {
      if (onCommit) {
        onCommit({
          color: previewColor,
          name: editable && editedName !== title ? editedName : null
        });
      }
      close();
    };

    modal.querySelector(".ac-cancel").onclick = () => {
      if (onCancel) onCancel();
      close();
    };

    modal.querySelector(".ac-overlay").onclick = () => {
      if (onCancel) onCancel();
      close();
    };


  }

  async function loadCommunityRoles() {
    const panel = document.querySelector(".roles-panel");
    if (!panel) return;

    const slug = panel.dataset.communitySlug;
    const container = panel.querySelector(".roles-list");

    try {
      const res = await fetch(`/api/community/${slug}/roles`);
      const roles = await res.json();

      // Inject full table structure
      container.innerHTML = `
        <table class="roles-table">
          <thead>
            <tr>
              <th>Role</th>
              <th style="text-align:center;">Members</th>
              <th class="uitent">Color</th>
            </tr>
          </thead>
          <tbody class="roles-tbody"></tbody>
        </table>
      `;

      const tbody = container.querySelector(".roles-tbody");

      roles.forEach(role => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td>
            <span class="role-badge"
                  data-role-id="${role.id}"
                  style="color:${role.color};border-color:${role.color};">
              ${capitalizeFirst(role.name)}
            </span>
          </td>

          <td class="role-count">${role.members}</td>

          <td>
            <div class="role-color">
              <div class="role-color-box"
                  data-role-id="${role.id}"
                  data-color="${role.color}"
                  style="background:${role.color};border-color:${role.color};">
              </div>
            </div>
          </td>
        `;

        // ⬇️ ATTACH CLICK HANDLER HERE
        const colorBox = row.querySelector(".role-color-box");

        colorBox.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation(); // 🔑 prevents instant close

          createColorPicker(colorBox, role.id);
        });

        tbody.appendChild(row);
      });
      document.addEventListener("pointerdown", (e) => {
        if (!activePicker) return;

        if (e.target.closest(".color-picker")) return;
        if (e.target.closest(".role-color-box")) return;

        removeColorPicker();
      });
      document.addEventListener("contextmenu", (e) => {
        const row = e.target.closest("tr");
        if (!row || !row.querySelector(".role-badge")) return;

        e.preventDefault(); // 🔥 disable browser menu

        const badge = row.querySelector(".role-badge");
        const colorBox = row.querySelector(".role-color-box");

        const roleId = badge.dataset.roleId;
        const roleName = badge.textContent.trim();
        const roleColor = colorBox?.dataset.color || "#000";
        const roleSlug = roleName.toLowerCase();

        openRoleContextMenu({
          x: e.clientX,
          y: e.clientY,
          roleId,
          roleName,
          roleColor,
          roleSlug
        });
      });
      document.addEventListener("pointerdown", (e) => {
        if (!activeRoleMenu) return;
        if (e.target.closest(".role-context-menu")) return;
        closeRoleContextMenu();
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeRoleContextMenu();
      });

      window.addEventListener("scroll", closeRoleContextMenu, true);


    } catch (err) {
      console.error("Failed to load roles", err);
    }
  }

  function hasCommunityChanged() {

    if (communityName.value.trim() !== originalCommunityState.name) return true;

    if (communityAbout.value.trim() !== originalCommunityState.about) return true;

  function CallThisFunction() {
    communityName = document.getElementById("communityName");
    communityWebsite = document.getElementById("communityWebsite");
    communityAbout = document.getElementById("communityAbout");

    if (!communityName || !communityWebsite || !communityAbout) return;

    originalCommunityState = {
      name: communityName.value.trim(),
      website: communityWebsite.value.trim(),
      about: communityAbout.value.trim(),
    };

    const avatarOverlay = document.getElementById("avatarOverlay");
    const avatarInput = document.getElementById("avatarInput");
    const communityLogo = document.getElementById("communityLogo");

    avatarOverlay.addEventListener("click", () => {
      avatarInput.click();
    });

    avatarInput.addEventListener("change", () => {
      const file = avatarInput.files[0];
      if (!file) return;

      if (!file.type.startsWith("image/")) {
        alert("Please select an image");
        avatarInput.value = "";
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        communityLogo.src = reader.result;
        avatarChanged = true;
        maybeToggleSave?.();
      };

      reader.readAsDataURL(file);
    });

    communityName.addEventListener("input", maybeToggleSave);
    communityWebsite.addEventListener("input", maybeToggleSave);
    communityAbout.addEventListener("input", maybeToggleSave);
  }




  function handleKeyboardOffset(el) {
    if (!window.visualViewport) return;

    let raf = null;

    const update = () => {
      if (raf) cancelAnimationFrame(raf);

      raf = requestAnimationFrame(() => {
        const offset =
          window.innerHeight - window.visualViewport.height;

        el.style.bottom =
          offset > 0 ? `${offset + 16}px` : "24px";
      });
    };

    window.visualViewport.addEventListener("resize", update);
    update();
  }


  function createSaveButton() {
    if (saveWrapper) return;

    saveWrapper = document.createElement("div");
    saveWrapper.className = "save-community-wrapper";

    saveBtn = document.createElement("button");
    saveBtn.className = "save-community-btn hidden";
    saveBtn.textContent = "Save changes";
    
    saveBtn.onclick = async () => {
      saveBtn.disabled = true;
      saveBtn.textContent = "Saving...";

      try {
        const formData = new FormData();

        // TEXT FIELDS
        if (communityName.value.trim() !== originalCommunityState.name) {
          formData.append("name", communityName.value.trim());
        }

        if (communityWebsite.value.trim() !== originalCommunityState.website) {
          formData.append("website", communityWebsite.value.trim());
        }

        if (communityAbout.value.trim() !== originalCommunityState.about) {
          formData.append("about", communityAbout.value.trim());
        }

        // LOGO
        if (avatarChanged) {
          const file = document.getElementById("avatarInput")?.files?.[0];
          if (file) {
            formData.append("logo", file);
          }
        }

        if (![...formData.keys()].length) {
          hideSave();
          return;
        }

        const res = await fetch(
          `/api/community/{{ community.slug }}/settings/general`,
          {
            method: "POST",
            headers: {
              "X-CSRFToken": csrfToken
            },
            credentials: "same-origin",
            body: formData
          }
        );

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Update failed");

        // 🔄 sync state
        originalCommunityState = {
          name: data.community.name,
          website: data.community.website || "",
          about: data.community.about || "",
          blockchain: data.community.blockchain || "",
        };

        if (data.community.logo_url) {
          document.getElementById("communityLogo").src =
            data.community.logo_url;
        }

        avatarChanged = false;
        hideSave();

      } catch (err) {
        showToast(err.message);
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = "Save changes";
      }
    };


    saveWrapper.appendChild(saveBtn);
    document.body.appendChild(saveWrapper);
    handleKeyboardOffset(saveWrapper);
    }

    function showOTPStatus(container, html, type = "wait") {
      const statusEl = container.querySelector("#resendStatus");
      if (!statusEl) return;

      clearTimeout(statusEl._timer);

      statusEl.className = `resend-status show ${type}`;
      statusEl.innerHTML = html;

      statusEl._timer = setTimeout(() => {
        statusEl.classList.remove("show");

        setTimeout(() => {
          statusEl.innerHTML = "";
          statusEl.className = "resend-status";
        }, 400);
      }, 5000);
    }

  function attachOTPLogic({
    container,
    submitBtnId,
  }) {
    const boxes = container.querySelectorAll(".otp-box");
    const inputs = container.querySelectorAll(".otp-input");
    const submitBtn = container.querySelector(`#${submitBtnId}`);
    const resendBtn = container.querySelector("#resendCode");

    function getCode() {
      return [...inputs].map(i => i.value).join("");
    }

    function updateState() {
      submitBtn.classList.toggle("valid", getCode().length === 6);

    }

    inputs.forEach((input, index) => {
      input.addEventListener("focus", () => {
        boxes[index].classList.add("active");
      });

      input.addEventListener("blur", () => {
        boxes[index].classList.remove("active");
      });

      input.addEventListener("input", e => {
        let val = e.target.value.replace(/\D/g, "");

        boxes.forEach(b => b.classList.remove("error"));

        // 📋 paste handling
        if (val.length > 1) {
          val
            .slice(0, 6)
            .split("")
            .forEach((char, i) => {
              if (inputs[i]) inputs[i].value = char;
            });

          inputs[Math.min(val.length, 5)]?.focus();
          updateState();
          return;
        }

        input.value = val;

        if (val && inputs[index + 1]) {
          inputs[index + 1].focus();
        }

        updateState();
      });

      input.addEventListener("keydown", e => {
        if (e.key !== "Backspace") return;
        e.preventDefault();

        boxes.forEach(b => b.classList.remove("error"));

        if (input.value) {
          input.value = "";
        } else if (inputs[index - 1]) {
          inputs[index - 1].value = "";
          inputs[index - 1].focus();
        }

        updateState();
      });
    });

    container.querySelector(".otp-row").addEventListener("paste", e => {
      e.preventDefault();

      const pasted = (e.clipboardData || window.clipboardData)
        .getData("text")
        .replace(/\D/g, "")
        .slice(0, 6);

      pasted.split("").forEach((char, i) => {
        if (inputs[i]) inputs[i].value = char;
      });

      inputs[Math.min(pasted.length, 5)]?.focus();
      updateState();
    });
    submitBtn.onclick = async () => {
      if (!submitBtn.classList.contains("valid")) return;

      const result = await confirmDeleteWithOTPComm(getCode());

      if (result.status === "invalid") {
        boxes.forEach(b => b.classList.add("error"));
        return;
      }

      if (result.status === "expired") {
        inputs.forEach(i => i.value = "");
        boxes.forEach(b => b.classList.remove("error"));
        inputs[0].focus();
        updateState();
        showOTPStatus(container, "Code expired. Please resend.", "wait");
        return;
      }

      if (result.status === "scheduled") {
        showSuccess("Community deletion scheduled successfully");

        setTimeout(() => {
          window.location.href = result.redirect;
        }, 2000);
      }
    };

  }


  async function confirmDeleteWithOTPComm(code) {
    const res = await fetch("/community/confirm-delete", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": csrfToken
      },
      body: JSON.stringify({
        otp: code,
        slug: window.CURRENT_COMMUNITY_SLUG
      })
    });

    const data = await res.json();

    if (!res.ok) {
      if (data.error === "expired" || data.error === "code_expired") {
        return { status: "expired" };
      }
      return { status: "invalid" };
    }

    if (data.status === "scheduled") {
      return {
        status: "scheduled",
        redirect: data.redirect
      };
    }

    return { status: "invalid" };
  }





  </script>



<script>
  function updateContinueState() {
    const input = document.getElementById("customAmount").value;
    const btn = document.getElementById("initerprinamry");
    const amount = parseFloat(input) || selectedAmount;
    if (amount >= 0.1) {
      btn.classList.add("active");
    } else {
      btn.classList.remove("active");
    }
  }

  let selectedAmount = 0;

  function openTopupModal() {
    document.getElementById("topupModal").style.display = "flex";
  }

  function closeTopupModal() {
    document.getElementById("topupModal").style.display = "none";
  }

  function selectAmount(amount, el) {
    const input = document.getElementById("customAmount");
    if (el.classList.contains("active")) {
      el.classList.remove("active");
      selectedAmount = 0;
      input.value = "";
    } else {
      document.querySelectorAll(".amount-option")
        .forEach(btn => btn.classList.remove("active"));
      el.classList.add("active");
      selectedAmount = amount;
      input.value = amount;
    }
    updateContinueState();
  }

  function continueTopup() {
    const custom = parseFloat(document.getElementById("customAmount").value);
    const amount = custom || selectedAmount;
    if (!amount || amount <= 0) {
      alert("Please enter a valid ZEC amount");
      return;
    }
    window.location.href = `/${window.CURRENT_COMMUNITY_SLUG}/pay?prefillAmount=${amount}`;
  }
</script>
