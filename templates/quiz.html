<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{
  font-family: "Inter", "Segoe UI", system-ui, sans-serif;

}


/* Make both containers same width */
.outer-box,
.popup-container {
   width: 100% !important;
    box-sizing: border-box;
}

 @media (max-width: 991px){

.outer-box,
.popup-container {
    width: 100% !important;
    box-sizing: border-box !important;
}
 }
 
/* Outer container */
.outer-box {
    position: relative;
    border: 1.5px solid rgba(255, 255, 255, 0.2);
    border-radius: 20px;
    padding: 50px 20px 20px;
}

/* Floating label above */
.plabeled {
    position: absolute;
    top: -16px;
    left: 20px;
    background: #6f42c1; /* purple for quiz */
    color: white;
    font-size: 14px;
    padding: 6px 16px;
    border-radius: 50px;
    display: flex;
    align-items: center;
    font-weight: bold;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}

.plabeled i {
    margin-right: 6px;
}




/* Popup container */
.popup-container {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 18px;
    padding: 20px 20px 30px;
    position: relative;
    color: white;
}

/* Upward arrow above container */
.popup-container::before {
    content: "";
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-bottom: 12px solid #222;
}

.popup-header {
    display: flex;
    align-items: center;
    font-weight: 700;
    font-size: 1.1rem;
    margin-bottom: 16px;
    gap: 10px;
}

.popup-header .ziconquiz {
    background: #6f42c1; /* purple for quiz */
    padding: 6px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.popup-header .ziconquiz i {
    color: white;
    font-size: 18px;
}

.popup-actions {
    margin-left: auto;
    display: flex;
    gap: 15px;
}

.popup-actions button {
    background: transparent;
    border: none;
    cursor: pointer;
    color: #ccc;
    font-size: 18px;
}

.popup-actions button:hover {
    color: white;
}

.custom-radio {
   font-size: 0.9rem;
   font-weight: bold;
    margin-top: 14px;
    display: block;
    margin-bottom: 0;
}

#unferved {
    width: 90%;
    padding: 10px 14px;
    border-radius: 14px;
    margin-left: 6px;
    color: white;
    font-size: 1rem;
}

.unferved {
    width: 90%;
    padding: 10px 14px;
    border-radius: 14px;
    margin-left: 6px;
    color: white;
    font-size: 1rem;
}


.liners {
    height: 0.5px;
    background-color: #2e65ff;
    border-radius: 1px;
    margin: 8px -20px; /* matches container's horizontal padding */
}


#YoulinkInput,
  #YourTextArea {
    background-color: transparent;
    border: none;           /* Remove border */
    outline: none;          /* Remove focus outline */
    font-size: 16px;
    padding: 8px;
    width: 100%;
    resize: none;           /* For textarea: remove resize handle if desired */
  }

  /* Optional: placeholder style */
  #YoulinkInput::placeholder,
  #YourTextArea::placeholder {
    color: #888;            /* Light gray placeholder text */
  }

  /* Optional: remove autofill background (Chrome) */
  input:-webkit-autofill {
    background-color: transparent !important;
    -webkit-box-shadow: 0 0 0px 1000px transparent inset;
    -webkit-text-fill-color: #000;
  }

  #YoulinkInput {
    background-color: transparent;
    border: none;
    outline: none;
    font-size: 16px;
    padding: 8px;
    width: 100%;
    color: aliceblue; /* text color when user types */
  }

  /* Make placeholder look like normal text */
  #YoulinkInput::placeholder {
    color: aliceblue;       /* same color as normal text */
    opacity: 1;        /* ensure placeholder is fully visible */
  }

  
    .transoptions {
      margin-top: 15px;
      gap: 10px;
    }

    .optiony {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }

    .optiony input {
      margin-right: 8px;
    }

    .add-option {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      background: #333;
      border: none;
      color: #aaa;
      font-size: 14px;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .add-option:hover {
      background: #444;
      color: #fff;
    }
.spacinelement {
  display: flex;
  flex-direction: column;
  gap: 5px; /* spaces between each .mutiplespacing */
}


.mutiplespacing {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
}

.mutiplespacing .text .title {
    font-weight: bold;
    font-size: 12px;
}

.mutiplespacing .text .description {
    font-size: 13px;
    color: #888;
    margin-top: 3px;
}

/* Toggle switch styles */
.switch {
  position: relative;
  display: inline-block;
  width: 40px;
  height: 20px;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background-color: #ccc;
  transition: 0.3s;
  border-radius: 20px;
}

.slider:before {
  position: absolute;
  content: "";
  height: 16px;
  width: 16px;
  left: 2px;
  bottom: 2px;
  background-color: white;
  transition: 0.3s;
  border-radius: 50%;
}

input:checked + .slider {
  background-color: #4caf50;
}

input:checked + .slider:before {
  transform: translateX(20px);
}

.optns::placeholder {
  color: aliceblue;       /* same color as normal text */
  opacity: 1;        /* ensure placeholder is fully visible */
}

.optiony {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
  position: relative; /* <-- this fixes it */
}

.remove-option {
  position: absolute;
  top: 50%;
  right: 6px;
  transform: translateY(-50%);
  border: none;
  background: none;
  color: #aaa;
  font-size: 16px;
  cursor: pointer;
}

.remove-option:hover {
  color: red;
}
.polltit{
  font-weight: bold;
  font-size: 15px;
  color: aliceblue;

}
.polldesc{
  color: #787878;

}

.radio-group {
  display: flex;
  flex-direction: column;
  gap: 8;
  width: 100%; /* or any fixed width you want */
  font-family: Arial, sans-serif;
}

.custom-radio {
  display: inline-flex;       /* keep inline but still flex */
  align-items: center;
  padding: 12px;
  border: 0.1px solid #cccccc57;
  border-radius: 12px;
  background-color: transparent; /* dark background */
  color: #fff;
  cursor: pointer;
  transition: background-color 0.2s, border-color 0.2s;
  position: relative;
}

.custom-radio:hover {
  border-color: #888;
}

.custom-radio input {
  display: none; /* hide default radio button */
}

.radio-btn {
   flex: 0 0 16px;
  height: 16px;
  width: 16px;
  border: 2px solid #fff;
  border-radius: 50%;
  margin-right: 12px;
  position: relative;
}

.custom-radio input:checked + .radio-btn::after {
  content: '';
  position: absolute;
  top: 4px;
  left: 4px;
  width: 8px;
  height: 8px;
  background-color: #fff;
  border-radius: 50%;
}

.custom-radio input:checked {
  background-color: #444; /* optional: darker background when selected */
}

.custom-radio-other {
  position: relative;   /* needed for absolute positioning */
  display: block;       /* full width */
  padding: 3px;
  border: 0.1px solid #cccccc57;
  border-radius: 12px;
  margin-top: 10px;
  background-color: transparent;
}
/* hide the input regardless of type */
.custom-radio-other input[type="radio"],
.custom-radio-other input[type="checkbox"] {
  display: none;
}

/* the visual button */
.custom-radio-other .radio-btn {
  height: 16px;
  cursor: pointer;
  margin-left: 8px;
  width: 16px;
  border: 2px solid #fff;
  border-radius: 50%; /* keep it circle even if it's a checkbox */
  position: relative;
}

/* checked state for both radio and checkbox */
.custom-radio-other input[type="radio"]:checked + .radio-btn::after,
.custom-radio-other input[type="checkbox"]:checked + .radio-btn::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 8px;
  height: 8px;
  background-color: #fff;
  border-radius: 50%;
}

.custom-radio-other .other-input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: white;
  font-size: 14px;
}

.other-input::placeholder{
  color: rgba(240, 248, 255, 0.484);
}
.marginpoll{
  margin-left: 13px
}
/* Hidden by default */
#otherOption {
  display: none;
}

.pollcontainer {
  text-align: right;
}

#pollitems{
  background-color: transparent;
  border: none;
  color: #2e65ff;
}

#pollitems:hover{
  background-color: #2c2c2c;
  border-radius: 30%;
}



.correct-answer {
  flex: 0 0 20px;    /* lock width */
  width: 20px;
  height: 20px;
  box-sizing: border-box; /* include border in size */
  border: 2px solid #444444;
  border-radius: 50%;
  margin-right: 12px;
  background-color: transparent;
  position: relative;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
}

/* green border when checked */
.correct-answer:checked {
  border-color: #00f104;
}

/* bigger inner dot */
.correct-answer:checked::after {
  content: '';
  position: absolute;
  top: 2px;   /* centers the dot */
  left: 2px;
  width: 12px;
  height: 12px;
  background-color: #00f104;
  border-radius: 50%;
}
.radiotext {
  display: flex;
  margin-bottom: 10px;
}
.correct-answer {
  margin-right: 10px;
  margin-top: 11px; /* shift it down */
  width: 20px;
  height: 20px;
  cursor: pointer;
}



.optiony {
  display: flex;
  align-items: center;
  flex: 1; /* make text input expand */
}

.optns {
  background-color: transparent;
  border: 0.1px solid #cccccc57;
  padding: 6px 10px;
  border-radius: 5px;
  outline: none; /* removes the default blue outline */
  transition: border 0.2s ease-in-out;
}



</style>
</head>

<script>
(root => {
  const pollButton   = root.querySelector(".js-poll-toggle");
  const timingDiv    = root.querySelector(".js-addingtiming");
  const chevron      = pollButton?.querySelector("i");
  const optionsContainer = root.querySelector(".js-options");
  const addOptionBtn = root.querySelector(".js-add-option");
  const radioGroup   = root.querySelector(".radio-group");
  const otherOption  = root.querySelector(".custom-radio-other");
  const multiToggle  = root.querySelector(".js-multi-toggle");
  const quizToggle   = root.querySelector(".js-quiz-toggle");
  const pollTitleInput = root.querySelector(".js-title-input");
  const pollDescInput  = root.querySelector(".js-desc-input");
  const pollTitleDiv   = root.querySelector(".polltit");
  const pollDescDiv    = root.querySelector(".polldesc");
  function syncPreview() {
    if (pollTitleDiv) pollTitleDiv.textContent = pollTitleInput.value || "";
    if (pollDescDiv)  pollDescDiv.textContent  = pollDescInput.value || "";

    const inputs = optionsContainer.querySelectorAll(".optiony input.optns");
    const labels = radioGroup?.querySelectorAll(".custom-radio span:last-child") || [];

    inputs.forEach((input, index) => {
      if (labels[index]) {
        labels[index].textContent = input.value || `Option ${index + 1}`;
      }
    });
  }
  root.syncPreview = syncPreview;
  // Toggle timing section
  pollButton?.addEventListener("click", () => {
    const isHidden = getComputedStyle(timingDiv).display === "none";
    timingDiv.style.display = isHidden ? "block" : "none";
    chevron.classList.replace(
      isHidden ? "fa-chevron-down" : "fa-chevron-up",
      isHidden ? "fa-chevron-up" : "fa-chevron-down"
    );
  });

  // Mirror Title + Description
  pollTitleInput?.addEventListener("input", () => {
    pollTitleDiv.textContent = pollTitleInput.value;
  });
  pollDescInput?.addEventListener("input", () => {
    pollDescDiv.textContent = pollDescInput.value;
  });

  // Re-label placeholders + sync labels
  function renumberOptions() {
    const inputs = optionsContainer.querySelectorAll(".optiony input");
    const labels = radioGroup.querySelectorAll(".custom-radio span:last-child");

    inputs.forEach((input, index) => {
      input.placeholder = `Option ${index + 1}`;
      if (labels[index]) {
        labels[index].textContent = input.value || `Option ${index + 1}`;
      }
    });
    enforceSelectionType();
  }

  // Enforce selection type (single/multiple)
  function enforceSelectionType() {
    // Radio group mirror
    const allInputs = radioGroup.querySelectorAll(".custom-radio input");
    allInputs.forEach(inp => {
      inp.type = multiToggle.checked ? "checkbox" : "radio";
      inp.name = multiToggle.checked ? "" : "single-choice"; 
    });

    // Other option
    const otherRadio = otherOption?.querySelector("input");
    if (otherRadio) {
      otherRadio.type = multiToggle.checked ? "checkbox" : "radio";
      otherRadio.name = multiToggle.checked ? "" : "single-choice";
    }

    // Correct answers
    const isMultiple = quizToggle?.checked;
    optionsContainer.querySelectorAll(".correct-answer").forEach(inp => {
      inp.type = isMultiple ? "checkbox" : "radio";
      inp.name = isMultiple ? "correct[]" : "correct";
    });
  }

  root.enforceSelectionType = enforceSelectionType;

  // Add new option
  addOptionBtn?.addEventListener("click", () => {
    const optionIndex = optionsContainer.querySelectorAll(".optiony").length + 1;
    const isMultiple = quizToggle.checked;

    let optionDiv = document.createElement("div");
    optionDiv.classList.add("radiotext"); 
    optionDiv.innerHTML = `
      <input type="${isMultiple ? "checkbox" : "radio"}" 
             name="${isMultiple ? "correct[]" : "correct"}" 
             class="correct-answer">
      <div class="optiony">
        <input id="unferved" type="text" class="optns" 
               style="background-color: transparent; border: 0.1px solid #cccccc57;" 
               placeholder="Option ${optionIndex}">
        <button class="remove-option">&times;</button>
      </div>
    `;
    optionsContainer.appendChild(optionDiv);

    // Add mirror label
    const checkboxLabel = document.createElement("label");
    checkboxLabel.classList.add("custom-radio");
    checkboxLabel.innerHTML = `
      <input type="${isMultiple ? "checkbox" : "radio"}" 
             name="${isMultiple ? "" : "single-choice"}"
             value="option${optionIndex}">
      <span class="radio-btn"></span>
      <span>Option ${optionIndex}</span>
    `;
    radioGroup.appendChild(checkboxLabel);
    // Push all current input values into preview immediately


    renumberOptions();
  
    syncPreview();

  });

  // Remove option
  optionsContainer?.addEventListener("click", e => {
    if (e.target.classList.contains("remove-option")) {
      const radiotextDiv = e.target.closest(".radiotext"); 
      if (radiotextDiv) {
        const index = [...optionsContainer.querySelectorAll(".radiotext")].indexOf(radiotextDiv);
        radiotextDiv.remove();
        const labels = radioGroup.querySelectorAll(".custom-radio");
        if (labels[index]) labels[index].remove();
      }
      renumberOptions();
    }
  });

  // Live sync input -> label
  optionsContainer?.addEventListener("input", e => {
    if (e.target.classList.contains("optns")) {
      const index = [...optionsContainer.querySelectorAll(".optiony input")].indexOf(e.target);
      const labels = radioGroup.querySelectorAll(".custom-radio span:last-child");
      if (labels[index]) {
        labels[index].textContent = e.target.value || `Option ${index + 1}`;
      }
    }
  });

  // Highlight correct answer input
  optionsContainer?.addEventListener("change", e => {
    if (e.target.classList.contains("correct-answer")) {
      if (!quizToggle.checked) {
        optionsContainer.querySelectorAll(".optns").forEach(inp => {
          inp.style.border = "0.1px solid #cccccc57";
        });
      }
      const radiotextDiv = e.target.closest(".radiotext");
      const textInput = radiotextDiv?.querySelector(".optns");
      if (textInput) {
        textInput.style.setProperty("border", e.target.checked ? "0.1px solid #00f104" : "0.1px solid #cccccc57", "important");
      }
    }
  });


  let isRestoring = false; 
  // Toggle between single/multiple correct answers
  quizToggle?.addEventListener("change", () => {
    if (isRestoring) {
      // Skip wiping answers when restoring from DB
      enforceSelectionType();
      syncMultiToggle();
      return;
    }

    const isMultiple = quizToggle.checked;

    // Reset all borders and uncheck (only on real user toggle)
    optionsContainer.querySelectorAll(".optns").forEach(inp => inp.style.border = "0.1px solid #cccccc57");
    optionsContainer.querySelectorAll(".correct-answer").forEach(inp => inp.checked = false);

    enforceSelectionType();
    syncMultiToggle();
  });

  // Keep multiToggle synced
  function syncMultiToggle() {
    if (quizToggle.checked) {
      multiToggle.checked = true;      
      multiToggle.disabled = true;     
    } else {
      multiToggle.disabled = false;    
    }
    enforceSelectionType(); 
  }
  syncMultiToggle();
  multiToggle?.addEventListener("change", enforceSelectionType);

  // Move radio button dot closer to "Other"
  root.querySelectorAll('.custom-radio-other').forEach(label => {
    const radioBtn = label.querySelector('.radio-btn');
    const textInput = label.querySelector('.other-input');
    radioBtn.style.position = 'absolute';
    radioBtn.style.left = '6px';
    radioBtn.style.top = '50%';
    radioBtn.style.transform = 'translateY(-50%)';
    textInput.style.paddingLeft = '26px';
  });

  renumberOptions();
})(root);
</script>
