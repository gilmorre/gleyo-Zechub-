*{
    box-sizing:border-box;
}
body{
    font-family: 'Outfit', sans-serif;
}

body{
    margin:0;
    background: var(--bg-app);
    color:#e5e7eb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.chat-wrapper{
    width:440px;
    height:640px;
    background: var(--bg-sidebar);
    backdrop-filter: blur(18px);
    border-radius:20px;
    padding:20px;
    display:flex;
    flex-direction:column;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    border:1px solid rgba(255,255,255,0.05);
}

.chat-wrapper h3{
    margin:0 0 15px 0;
    font-weight:600;
    font-size:18px;
    color:#f1f5f9;
}

.messages{
    flex:1;
    overflow-y:auto;
    padding-right:6px;
    margin-bottom:12px;
}

.messages::-webkit-scrollbar{
    width:6px;
}
.messages::-webkit-scrollbar-thumb{
    background:#334155;
    border-radius:6px;
}

.msg{
    padding:12px 14px;
    border-radius:14px;
    margin:8px 0;
    max-width:75%;
    font-size:14px;
    line-height:1.4;
    animation: fadeIn .2s ease;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(4px);}
    to{opacity:1;transform:translateY(0);}
}

.user{
    background:linear-gradient(135deg,#3b82f6,#6366f1);
    color:white;
    margin-left:auto;
    border-bottom-right-radius:4px;
}

.bot{
    background:#1e293b;
    color:#e2e8f0;
    border-bottom-left-radius:4px;
}

.input-area{
    display:flex;
    align-items:center;
    background: var(--bg-sidebar);
    border-radius: 20px;
    padding:6px;
    border:1px solid var(--border);
}

.input-area input{
    flex:1;
    background:transparent;
    border:none;
    padding:12px;
    color:#f8fafc;
    font-size:14px;
    outline:none;
}

.input-area button{
    background:linear-gradient(135deg,#3b82f6,#6366f1);
    border:none;
    width:42px;
    height:42px;
    border-radius: 50%;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    transition:all .2s ease;
}

.input-area button:hover{
    transform:scale(1.05);
}

.input-area svg{
    width:18px;
    height:18px;
    fill:white;
}

<body>

<div class="chat-wrapper">

    <h3>{{ community.name }} AI Assistance</h3>

    <div id="messages" class="messages"></div>

    <div class="input-area">
        <input
            id="chatInput"
            placeholder="Ask analytics..."
            onkeydown="if(event.key==='Enter') sendMessage()"
        >
        <button onclick="sendMessage()">
        <svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" style="fill:#fff; transform:rotate(90deg); width:20px; height:20px; pointer-events:none;">
            <path d="M234.69409,219.61572a15.86649,15.86649,0,0,1-12.15625,5.69141,16.171,16.171,0,0,1-5.44531-.95117l-81.21094-29.00391V120a8,8,0,1,0-16,0v75.352L38.67065,224.356a16.00042,16.00042,0,0,1-19.3418-22.88575l94.5918-168.91455a16.00119,16.00119,0,0,1,27.92188,0l94.59179,168.915A15.87045,15.87045,0,0,1,234.69409,219.61572Z"></path>
        </svg>
        </button>
    </div>

</div>

<script>
const communitySlug = "{{ community.slug }}";

async function sendMessage(){

    const input = document.getElementById("chatInput");
    const text = input.value.trim();

    if(!text) return;

    addMessage(text,"user");
    input.value="";

    const res = await fetch(`/api/${communitySlug}/ai-chat`,{
        method:"POST",
        headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": csrfToken
        },
        body:JSON.stringify({message:text})
    });

    const data = await res.json();
    addMessage(data.reply,"bot");
}

function addMessage(text,type){

    const box=document.getElementById("messages");

    const div=document.createElement("div");
    div.className="msg "+type;
    div.innerText=text;

    box.appendChild(div);
    box.scrollTop=box.scrollHeight;
}
</script>
