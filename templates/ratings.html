<style>
*{
  font-family: "Inter", "Segoe UI", system-ui, sans-serif;

}
/* Make both containers same width */
.outer-box,
.popup-container {
    width: 100% !important;
    box-sizing: border-box;
}
 @media (max-width: 991px){

.outer-box,
.popup-container {
    width: 100% !important;
    box-sizing: border-box !important;
}
 }
/* Outer container */
.outer-box {
    position: relative;
    border: 1.5px solid rgba(255, 255, 255, 0.2);
    border-radius: 20px;
    padding: 50px 20px 20px;
}


/* Floating label above */
.zlabeled {
    position: absolute;
    top: -16px;
    left: 20px;
    background: linear-gradient(135deg, #34d399, #10b981);
    color: white;
    font-size: 14px;
    padding: 6px 16px;
    border-radius: 50px;
    display: flex;
    align-items: center;
    font-weight: bold;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}

.zlabeled i {
    margin-right: 6px;
}

.js-verylikely,.js-notlikely,.js-lastnum,.js-firstnum{
  background-color: transparent;
  border: 0.1px solid #cccccc57;
  border-radius: 11px;
  padding: 10px;
  color: aliceblue;
  gap: 10px;
  width: 40%;
}
input[type="name"]{
  background-color: transparent;
  border: 0.1px solid #cccccc57;
  border-radius: 11px;
  padding: 10px;
  color: aliceblue;

}

.yourtaketitle{

/* Popup container */
.popup-container {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 18px;
    padding: 20px 20px 30px;
    position: relative;
    color: white;
}

/* Upward arrow above container */
.popup-container::before {
    content: "";
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-bottom: 12px solid #222;
}

.popup-header {
    display: flex;
    align-items: center;
    font-weight: 700;
    font-size: 1.1rem;
    margin-bottom: 16px;
    gap: 10px;
}

.popup-header .wiconquiz {
    background: linear-gradient(135deg, #34d399, #10b981);
    padding: 6px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.popup-header .wiconquiz i {
    color: white;
    font-size: 18px;
}

.popup-actions {
    margin-left: auto;
    display: flex;
    gap: 15px;
}

.popup-actions button {
    background: transparent;
    border: none;
    cursor: pointer;
    color: #ccc;
    font-size: 18px;
}

.popup-actions button:hover {
    color: white;
}

.custom-radio {
   font-size: 0.9rem;
   font-weight: bold;
    margin-top: 14px;
    display: block;
    margin-bottom: 0;
}

input[type="number"] {

    border-radius: 14px;
    margin-left: 6px;
    color: white;
    font-size: 1rem;
}




.liners {

/* Toggle switch styles */
.switch {
  position: relative;
  display: inline-block;
  width: 40px;
  height: 20px;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background-color: #ccc;
  transition: 0.3s;
  border-radius: 20px;
}

.slider:before {
  position: absolute;
  content: "";
  height: 16px;
  width: 16px;
  left: 2px;
  bottom: 2px;
  background-color: white;
  transition: 0.3s;
  border-radius: 50%;
}

input:checked + .slider {
  background-color: #4caf50;
}

input:checked + .slider:before {
  transform: translateX(20px);
}

.optn::placeholder {
  color: aliceblue;       /* same color as normal text */
  opacity: 1;        /* ensure placeholder is fully visible */
}

.option {

  align-items: center;

}

.remove-option {

.remove-option:hover {

}
.polldesc{

}



  .number-container {
    display: flex;
    justify-content: space-between; /* boxes start at left and end at right */

  }

  .number-box {
    background-color:#1c1c1e;
    border: 0.1px solid #cccccc57;
    color: white;
    flex: 1;          /* boxes grow equally */
    min-width: 30px;  /* optional minimum size */

    cursor: pointer;
    border-radius: 15px;

    text-align: center;
  }

  /* Active state styling */
.number-box.active {

  .containersters{

  }
</style>

<div style="outline: none; display: flex; justify-content: center; align-items: center;  flex-direction: column;">

<div data-type="Optionscale(numbers)" class="outer-box yourtake-root">

        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#fff"

<script>
/* This script expects your loader to run it as: new Function("root", code)(wrapper) */
const titleInput   = root.querySelector(".js-title-input");
const titlePreview = root.querySelector(".polltit");
if (titleInput && titlePreview) {
  titlePreview.textContent = titleInput.value || "";
  titleInput.addEventListener("input", () => {
    titlePreview.textContent = titleInput.value;
  });
}

const descInput   = root.querySelector(".js-desc-input");
const descPreview = root.querySelector(".polldesc");
if (descInput && descPreview) {
  descPreview.textContent = descInput.value || "";
  descInput.addEventListener("input", () => {
    descPreview.textContent = descInput.value;
  });
}

const leftInput  = root.querySelector(".js-notlikely");
const rightInput = root.querySelector(".js-verylikely");
const leftDiv    = root.querySelector(".js-left-label");
const rightDiv   = root.querySelector(".js-right-label");
if (leftInput && leftDiv) {
  leftInput.addEventListener("input", () => { leftDiv.textContent = leftInput.value; });
}
if (rightInput && rightDiv) {
  rightInput.addEventListener("input", () => { rightDiv.textContent = rightInput.value; });
}

const firstInput      = root.querySelector(".js-firstnum");
const lastInput       = root.querySelector(".js-lastnum");
const numberContainer = root.querySelector(".js-number-container");
const firstError      = root.querySelector(".js-first-error");
const lastError       = root.querySelector(".js-last-error");

function updateNumbers() {
  const startVal = (firstInput?.value || "").trim();
  const endVal   = (lastInput?.value || "").trim();
  let valid = true;

  if (!/^\d+$/.test(startVal)) {
    if (firstError) firstError.textContent = "Value must be an integer between 1 and 10";
    valid = false;
  } else {
    const start = parseInt(startVal, 10);
    if (start < 1 || start > 10) {
      if (firstError) firstError.textContent = "Minimum number is 1, maximum is 10";
      valid = false;
    } else if (firstError) {
      firstError.textContent = "";
    }
  }

  if (!/^\d+$/.test(endVal)) {
    if (lastError) lastError.textContent = "Value must be an integer between 1 and 10";
    valid = false;
  } else {
    const end = parseInt(endVal, 10);
    if (end < 1 || end > 10) {
      if (lastError) lastError.textContent = "Minimum number is 1, maximum is 10";
      valid = false;
    } else if (lastError) {
      lastError.textContent = "";
    }
  }

  if (!numberContainer) return;
  if (!valid) { numberContainer.innerHTML = ""; return; }

  let start = parseInt(startVal, 10);
  let end   = parseInt(endVal, 10);
  if (start > end) [start, end] = [end, start];

  numberContainer.innerHTML = "";
  for (let i = start; i <= end; i++) {
    const div = document.createElement("div");
    div.className = "number-box";
    div.textContent = i;
    div.addEventListener("click", () => {
      root.querySelectorAll(".number-box").forEach(b => b.classList.remove("active"));
      div.classList.add("active");
    });
    numberContainer.appendChild(div);
  }
}

if (firstInput && lastInput) {
  updateNumbers();
  firstInput.addEventListener("input", updateNumbers);
  lastInput.addEventListener("input", updateNumbers);
}
</script>
