<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Community Settings</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="csrf-token" content="{{ csrf_token() }}">

<style>
  
:root {
  --bg-app: #1e1e2f;
  --bg-sidebar: #181826;
  --bg-surface: #222236;
  --bg-hover: #2a2a44;
  --bg-hover-hover: #2a2a449c;
  --bg-active-border: #353555;
  --bg-active: #303050;
  --text-main: #e5e7eb;
  --text-main-items: #e5e7ebdf;
  --text-muted: #bbbfc7;
  --text-muted-bg: #b4b8c0;
  --toggle-knob: #f3f4f6;
  --border: #2f2f4a;
  --radius: 12px;
  --info-bg: rgba(250, 204, 21, 0.08);
  --info-border: rgba(250, 204, 21, 0.25);
}

* { box-sizing: border-box;font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent;}

/* =======================
   HEADER
======================= */
.portal-header {
  height: 64px;
  background: var(--bg-sidebar);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
}

.portal-header h1 {
  font-size: 18px;
  font-weight: 600;
}

/* =======================
   LAYOUT
======================= */


/* =======================
   SIDEBAR
======================= */
.settings-sidebar {
  width: 260px;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 20px 16px;
  padding-top: 0 !important;
}

.back-link {
  display: flex;
  align-items: center;
  background-color: var(--bg-sidebar);
  position: sticky;
  top: 0;
  padding-top: 20px;
  z-index: 1000;
  gap: 8px;
  font-size: 13px;
  color: var(--text-muted);
  text-decoration: none;
  margin-bottom: 18px;
}

.back-link:hover {
  color: var(--text-main);
}

.sidebar-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 8px;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  max-width: 100%;
  text-transform: uppercase;
}

/* MAIN ITEMS */
.nav-item {
  display: flex;
  align-items: center;
  padding: 10px 12px;
  border-radius: 8px;
  gap: 6px;
  text-decoration: none;
  color: var(--text-main-items);
  font-size: 14px;
  margin-bottom: 4px;
}

.nav-item svg, .nav-sub svg{
  width: 16px;
  height: 16px;
}

.nav-item:hover { 
  background: var(--bg-hover-hover); 
}

.nav-item.active {
  background: var(--bg-active);
  font-weight: 500;
  color: var(--text-main);
}

/* =======================
   CHAT GROUP
======================= */
.nav-group {
  margin-top: 6px;
}

.nav-group-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
}
 

.nav-group-header span {
  font-size: 14px;
  color: var(--text-main);
}

.chevron {
  width: 14px;
  height: 14px;
  opacity: 0.6;
}

/* SUB ITEMS */
.nav-sub {
  position: relative;
  margin-left: 14px;
  padding-left: 14px;
  margin-top: 6px;
  max-height: 500px;
  transition: max-height 0.25s ease, opacity 0.25s ease;
}

.nav-group.collapsed .nav-sub {
  max-height: 0;
  opacity: 0;
  margin-top: 0;
}

.nav-group.collapsed .chevron {
  transform: rotate(-90deg); 
}
/* vertical guide line */
.nav-sub::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 1px;
  background: var(--border);
}

.nav-sub a {
  gap: 8px;
  display: flex;
  padding: 8px 10px;
  font-size: 13px;
  color: var(--text-muted);
  text-decoration: none;
  border-radius: 6px;
  margin-bottom: 2px;
}

.nav-sub a:hover {
  background: var(--bg-hover-hover); 
  color: var(--text-main);
}

.nav-sub a.active {
  background: var(--bg-active);
  color: var(--text-main);
  font-weight: 500;
}

/* =======================
   CONTENT
======================= */








/* =======================
   BANNER + LOGO
======================= */
.banner {
  position: relative;
  height: 180px;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 64px;
  background: #111;
}

.banner img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Banner overlay */
.banner-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.25),
    rgba(0,0,0,0.6)
  );
}




.profile-hero {
  position: relative;
  margin-bottom: 80px;
  padding-top: 20px  !important;
}

/* =======================
   BANNER
======================= */
.banner {
  position: relative;
  height: 180px;
  border-radius: 12px;
  overflow: hidden;
  background: #111;
}

.banner img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.banner-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.25),
    rgba(0,0,0,0.6)
  );
}

.banner-action {
  position: absolute;
  top: 16px;
  right: 16px;
  background: rgba(0,0,0,0.55);
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}

/* =======================
   LOGO OVERLAP (FIXED)
======================= */
.logo-wrap {
  position: absolute;
  left: 24px;
  bottom: -36px; /* overlap banner */
  display: flex;
  align-items: center;
  gap: 14px;
  z-index: 5;
}

.logo {
  width: 72px;
  height: 72px;
  border-radius: 16px;
  border: 3px solid var(--bg-surface);
  overflow: hidden;
  background: #0f172a;
}

.logo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}


.logo-meta h2 {
  margin: 0;
  font-size: 18px;
}

.logo-meta span {
  font-size: 13px;
  color: var(--text-muted);
}

/* =======================
   FORM LAYOUT FIX
======================= */
.form-container {
  max-width: 560px;
}

.form-group small {
  display: block;
  margin-top: 6px;
  font-size: 12px;
  color: var(--text-muted);
}

input,
textarea {
  width: 100%;
}

/* Save button spacing */
.form-footer {
  margin-top: 40px;
}




/* =======================
   FORM STYLING (FIX)
======================= */
.form-group {
  margin-bottom: 22px;
}

.form-label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 6px;
  color: var(--text-main);
}

.form-label .optional {
  font-size: 11px;
  color: var(--text-muted);
  margin-left: 6px;
}

/* INPUTS */
input,
textarea {
  width: 100%;
  background: var(--bg-app);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 14px;
  color: var(--text-main);
  outline: none;
  transition: border 0.15s ease, background 0.15s ease;
}

input::placeholder,
textarea::placeholder {
  color: var(--text-muted);
}

/* TEXTAREA */
textarea {
  min-height: 96px;
  resize: vertical;
}

/* FOCUS STATE */
input:focus,
textarea:focus {
  border-color: #6366f1; /* indigo accent */
}

/* HELP TEXT */
.form-group small {
  display: block;
  margin-top: 6px;
  font-size: 12px;
  color: var(--text-muted);
}

/* =======================
   SAVE BUTTON
======================= */
.save-btn {
  background: #6366f1;
  border: none;
  color: #fff;
  font-size: 14px;
  font-weight: 500;
  padding: 10px 16px;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.15s ease, transform 0.05s ease;
}

.save-btn:hover {
  background: #5558e8;
}

.save-btn:active {
  transform: translateY(1px);
}


.bar-quest-container {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: none;
  border-radius: 50%;
  width: 36px;
  height: 36px;
  cursor: pointer;
  left: 3%;
  padding: 0;
}


.bar-quest-init { 
  position: absolute;
  height: 2px;
  border-radius: 10px;
  background: #fff;
  display: block;
}

.bar-top {
  top: 13px;   
  left: 8px;
  width: 20px;
}

.bar-bottom {
  top: 20px;
  left:9.5px;
  width: 12px;
}

/* =======================
   BAR → X TOGGLE
======================= */

.bar-quest-container svg {
  position: absolute;
  opacity: 0;
  transition: opacity 0.2s ease;
}

.bar-quest-init {
  transition:
    opacity 0.2s ease,
    transform 0.25s ease;
}

/* OPEN STATE */
body.sidebar-open .bar-quest-init {
  opacity: 0;
}

body.sidebar-open .bar-quest-container svg {
  opacity: 1;
}


html, body {
  margin: 0;
  background: var(--bg-app);
  color: var(--text-main);
}
@media (min-width: 768px) {

  html, body {
    overflow: hidden;
    height: 100dvh;
  }
  .settings-content {
    flex: 1;
    height: 100dvh;
    padding: 32px;
    overflow: hidden; /* important */
  }
.card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  overflow-y: auto;
  height: 80dvh;
  border-radius: var(--radius);
  padding: 20px;
  padding-top: 0  !important;
}

.settings-layout {
  display: flex;
  height: calc(100vh - 4px);
}

}



@media (max-width: 768px) {


  .settings-layout {
    display: flex;
    height: calc(100dvh - 64px);
  }


  .settings-sidebar {
    position: fixed;
    top: 64px; 
    left: 0;
    height: 100%;

    width: 260px;
    transform: translateX(-100%);
    transition: transform 0.3s ease;

    z-index: 2000;
    border-right: 1px solid var(--border);
    box-shadow: 10px 0 30px rgba(0,0,0,0.35);
  }

  body.sidebar-open .settings-sidebar {
    transform: translateX(0);
  }

  .settings-content {
    height: 100%;
    width: 100% !important;
    min-width: 100% !important;
    padding: 0;
    overflow: hidden; /* important */
  }

  .card {
    background: var(--bg-surface);
    overflow-y: auto;
    height: 100%;
    border-radius: 0;
    width: 100% !important;
    min-width: 100% !important;
    padding: 20px;
    padding-left: 0;
    padding-right: 0;
    padding-top: 0  !important;
  }

  .main-layout{
  display: grid;
  height: calc(100dvh - 7px) !important;
  overflow-y: hidden !important;
  overflow: hidden !important;
  padding: 0 !important;
  overflow: hidden;
 
  }


}





</style>
</head>

    document.body.style.overflow="hidden"

  });

  sidebar?.addEventListener('click', (e) => {
    e.stopPropagation();
  });

  function ClosemobileUI() {
    if (document.body.classList.contains('sidebar-open')) {
      document.body.classList.remove('sidebar-open');

<script>


function getSettingsSlug(path = window.location.pathname) {
  const match = path.match(/\/settings\/([^/]+)/);
  return match ? match[1] : null;
}




function isBaseSettings(path) {
  return /\/settings\/?$/.test(path);
}

function normalizeSettingsPath(path) {
  if (isBaseSettings(path)) {
    return path.replace(/\/settings\/?$/, "/settings/general");
  }
  return path;
}

async function loadSettingsSection(path, push = true) {
  const finalPath = normalizeSettingsPath(path);
  const slug = getSettingsSlug(path);
  ClosemobileUI();
  const res = await fetch(finalPath, {
    headers: { "X-Partial": "1" }
  });

  if (!res.ok) return;

  const html = await res.text();
  document.getElementById("inject-card").innerHTML = html;

  if (push) {
    history.pushState({}, "", finalPath);
  }

  setActiveNav(finalPath);

  if (slug === "billing") {
   initBillingTabs();
  }


  if (slug === "security") {
   functionMintSecurity();
  }


  if (slug === "/chat/emojis") {
    injectEmojis(window.EMOJIS || []);
    setupEmojiUpload();
  }


  if (slug === "integrations") {
      if (finalPath.includes("/integrations/discord")) {
      LoadDiscordInit();
      initNotifyToggles();
    }


  }

    if (finalPath.includes("webhooks")) {
        WebHooks();

    }
  if (slug === "chat") {
    if (finalPath.includes("/chat/tickets")) {
      initTicketDisableUI();
    }

    if (finalPath.includes("/chat/moderation")) {
      initCommunityInteractionToggles();
    }

    if (finalPath.includes("/chat/emojis")) {
       setupEmojiUpload();
       fetchAndHydrateEmojis();
       

    }
  }



}

function initNotifyToggles() {
  document
    .querySelectorAll(".notify-switch input[type='checkbox']")
    .forEach(cb => toggleOptions(cb));
}



function setActiveNav(path) {
  document.querySelectorAll("[data-path]").forEach(el => {
    el.classList.toggle("active", el.dataset.path === path);
  });
}


function getBillingCycle() {
  const params = new URLSearchParams(location.search);

  if (params.has("cycle")) {
    return params.get("cycle"); // monthly | annually
  }

  const saved = sessionStorage.getItem("billingCycle");
  if (saved) return saved;

  return "monthly"; // ✅ DEFAULT
}


/* ✅ SAVE ONLY REAL SUB-SECTIONS */
if (
  location.pathname.includes("/settings/") &&
  !isBaseSettings(location.pathname)
) {
  sessionStorage.setItem("lastSettingsPath", location.pathname);
}

window.addEventListener("popstate", () => {
  loadSettingsSection(location.pathname, false);
});

document.addEventListener("DOMContentLoaded", () => {
  let path = location.pathname;

  if (isBaseSettings(path)) {
    const saved = sessionStorage.getItem("lastSettingsPath");
    if (saved) path = saved;
  }

  loadSettingsSection(path, false);
});



async function LoadDiscordInit() {
  const communityId = "{{ community.id }}";
  const getCached = async (key, url) => {
    const cached = sessionStorage.getItem(key);
    if (cached) return JSON.parse(cached);

    const res = await fetch(url);
    const data = await res.json();
    sessionStorage.setItem(key, JSON.stringify(data));
    return data;
  };

  const rolesData = await getCached(
    "discord_roles_" + communityId,
    `/api/community/${communityId}/discord_roles`
  );

  const channelsData = await getCached(
    "discord_channels_" + communityId,
    `/api/community/${communityId}/discord_channels`
  );

  document.querySelectorAll(".smart-dd").forEach(dd => {
    const type = dd.dataset.type;
    const selectedId = dd.dataset.selected;
    const triggerText = dd.querySelector(".smart-dd-trigger span");
    const menu = dd.querySelector(".smart-dd-menu");
    const hiddenInput = dd.querySelector("input[type=hidden]");

  const items =
    type === "channel"
      ? (channelsData?.channels || [])
      : (rolesData?.roles || []);


    // clear menu
    menu.innerHTML = "";
 

    items.forEach(item => {
      const label =
        type === "channel"
          ? `# ${item.name}`
          : `${item.name.startsWith("@") ? "" : "@"}${item.name}`;

      const div = document.createElement("div");
      div.className = "smart-dd-item";
      div.textContent = label;
      div.dataset.id = item.id;

    div.onclick = async () => {
      hiddenInput.value = item.id;
      triggerText.textContent = label;
      dd.classList.remove("open");

      const card = dd.closest(".notify-card");
      const checkbox = card.querySelector(".notify-switch input");
      const notifType = checkbox.name.replace("_enabled", "");

      const payload = {
        type: notifType,
        enabled: checkbox.checked
      };

      if (type === "channel") {
        payload.channel_id = item.id;
      } else {
        payload.role_id = item.id;
      }

      await fetch(
        `/api/community/{{ community_slug }}/discord/notification`,
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": csrfToken
          },
          body: JSON.stringify(payload)
        }
      );
    };

      menu.appendChild(div);

      // restore selected
      if (selectedId && selectedId == item.id) {
        hiddenInput.value = item.id;
        triggerText.textContent = label;
      }
    });

    dd.querySelector(".smart-dd-trigger").onclick = () => {
      dd.classList.toggle("open");
    };
  });

  // close on outside click
  document.addEventListener("click", e => {
    document.querySelectorAll(".smart-dd.open").forEach(dd => {
      if (!dd.contains(e.target)) dd.classList.remove("open");
    });
  });
}






function toggleOptions(checkbox) {
  const options = checkbox.closest(".notify-card").querySelector(".notify-options");
  options.style.display = checkbox.checked ? "flex" : "none";
}


function resetSmartDropdown(dd, placeholder) {
  const triggerText = dd.querySelector(".smart-dd-trigger span");
  const hiddenInput = dd.querySelector("input[type='hidden']");

  if (triggerText) triggerText.textContent = placeholder;
  if (hiddenInput) hiddenInput.value = "";

  dd.dataset.selected = "";
  dd.classList.remove("open");
}


function functionMintSecurity() {

  /* ================= COMMUNITY SECURITY TOGGLES ================= */
  document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
    if (checkbox.closest('.notify-card')) return; // skip Discord notification checkboxes

    checkbox.addEventListener('change', function () {
      fetch("{{ url_for('toggle_setting', community_slug=community_slug) }}", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-CSRFToken": csrfToken },
        body: JSON.stringify({
          field: this.name,
          value: this.checked
        })
      })
      .then(r => r.json())
      .then(data => {
        if (!data.success) {
          alert(data.error || "Failed to update setting");
          this.checked = !this.checked; // revert state
        }
      });
    });
  });


  /* ================= XP INPUT (DEBOUNCED) ================= */
  const xpInput = document.querySelector('.xp-input');
  const errorMsg = document.querySelector('.error-msg');
  let debounceTimer;

  if (xpInput) {
    xpInput.addEventListener('input', function () {
      clearTimeout(debounceTimer);
      const input = this;

      debounceTimer = setTimeout(() => {
        fetch("{{ url_for('toggle_setting', community_slug=community_slug) }}", {
          method: "POST",
          headers: { "Content-Type": "application/json","X-CSRFToken": csrfToken },
          body: JSON.stringify({
            field: input.name,
            value: input.value
          })
        })
        .then(r => r.json())
        .then(data => {
          if (!data.success) {
            input.style.borderColor = "1px solid #ff4d4d";
            errorMsg.style.display = "inline";
          } else {
            input.style.border = "0.1px solid #cccccc57";
            errorMsg.style.borderColor = "none";
          }
        });
      }, 400);
    });
  }


  /* ================= DISCORD NOTIFICATION TOGGLES ================= */
document
  .querySelectorAll(".notify-switch input[type='checkbox']")
  .forEach(el => {
    const notifType = el.name.replace('_enabled', '');
    el.addEventListener('change', () =>
      toggleDiscordNotification(el, notifType)
    );
  });


}

function toggleDiscordNotification(el, notifType) {
  fetch("{{ url_for('toggle_discord_notification', community_slug=community_slug) }}", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",

function initBillingTabs() {

  const tabs = document.querySelectorAll(".billing-tab");
  const contents = document.querySelectorAll(".sub-tab-content");
  const indicator = document.querySelector(".billing-indicator");

  if (!tabs.length || !contents.length || !indicator) return;

  function moveIndicator(tab) {
    indicator.style.width = tab.offsetWidth + "px";
    indicator.style.transform = `translateX(${tab.offsetLeft}px)`;
  }


  if (location.pathname.includes("monthly")) {
    initialSubtab = "monthly";
  }

  let initialSubtab = getBillingCycle();

  const initialTab = document.querySelector(
    `.billing-tab[data-subtab="${initialSubtab}"]`
  );
  // SET INITIAL STATE
  tabs.forEach(t => t.classList.remove("active"));
  contents.forEach(c => c.classList.remove("active"));

  if (initialTab) {
    initialTab.classList.add("active");
    document
      .getElementById(initialSubtab)
      ?.classList.add("active");

    moveIndicator(initialTab);
  }

  // CLICK HANDLERS
  tabs.forEach(tab => {
    tab.addEventListener("click", () => {
      const target = tab.dataset.subtab;

      // UI
      tabs.forEach(t => t.classList.remove("active"));
      contents.forEach(c => c.classList.remove("active"));

      tab.classList.add("active");
      document.getElementById(target)?.classList.add("active");
      moveIndicator(tab);

      // 🔒 Persist state
      sessionStorage.setItem("billingCycle", target);

      // 🔗 Update URL (no reload)
      const params = new URLSearchParams(location.search);
      params.set("cycle", target);
      history.replaceState({}, "", `${location.pathname}?${params}`);
    });
  });

}

function saveWebhook(panel) {

    alert("Webhook URL required");
    return;
  }

  fetch("/api/community/webhooks", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-CSRFToken": csrfToken
    },
    body: JSON.stringify({
      community_slug: "{{ community_slug }}",
      endpoint_url: url

function setupEmojiUpload() {

async function uploadEmoji(file) {
  const formData = new FormData();
  formData.append("emoji", file);

  const res = await fetch(
    `/api/communities/{{ community_slug }}/emojis`,
    {
      method: "POST",
      headers: {
        "X-CSRFToken": csrfToken
      },
      body: formData
    }
  );

  if (!res.ok) {
    console.error("Upload failed");
    return;
  }

  const emoji = await res.json();

  // Hide empty state
  document
    .querySelector(".emoji-empty-state")
    ?.classList.replace("emoji-visible", "emoji-hidden");

  // Show uploaded container
  const uploaded = document.querySelector(".view-uploadedemoji");
  uploaded?.classList.replace("emoji-hidden", "emoji-visible");

  // Inject emoji card
  const list = uploaded.querySelector(".emoji-list");
  const wrapper = document.createElement("div");
  wrapper.innerHTML = renderEmojiCard(emoji);
  list.appendChild(wrapper.firstElementChild);

  // ✅ Update the emoji count
  const countSpan = document.querySelector(".emoji-count");
  if (countSpan) {
    // Get current count from the DOM, increment by 1
    const current = parseInt(countSpan.textContent.split("/")[0]) || 0;
    countSpan.textContent = `${current + 1}/65`;
  }
}

// ✅ Function to update emoji name
async function updateEmojiName(input) {
  const card = input.closest(".emoji-card");
  if (!card) return;

  const emojiId = card.dataset.emojiId;
  let newName = input.value.trim();

  // ✅ Only letters, numbers, underscore
  newName = newName.replace(/[^a-zA-Z0-9_]/g, "");

  if (!newName) {
    alert("Emoji name cannot be empty or invalid.");
    input.value = card.dataset.originalName || "";
    return;
  }

  try {
    const res = await fetch(
      `/api/communities/{{ community_slug }}/emojis/${emojiId}`,
      {
        method: "PATCH",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": csrfToken
        },
        body: JSON.stringify({ name: newName })
      }
    );

    if (!res.ok) {
      const data = await res.json();
      alert(data.error || "Failed to update emoji name");
      input.value = card.dataset.originalName || "";
      return;
    }

    // ✅ Save new name in data attribute
    card.dataset.originalName = newName;

    // ✅ Update input display with colons
    input.value = `:${newName}:`;

  } catch (err) {
    console.error("Emoji name update failed:", err);
    input.value = card.dataset.originalName || "";
  }
}


function updateEmojiLayoutState() {

  } else {
    // show uploaded view

    uploadedView.classList.replace("emoji-hidden", "emoji-visible");
  }
}

function initTicketDisableUI() {
  const durationBtns = document.querySelectorAll(".duration-btn");
  const manualBox = document.querySelector(".manual-disable");
  const actionBtn = document.querySelector(".btn-danger");
  const cancelBtn = document.querySelector(".btn-secondary.cancel");
  const manualActive = manualBox
    ? manualBox.classList.contains("active")
    : false;

  // 🧠 shared state
  const selection = {
    type: null,   // "duration" | "manual"
    hours: null
  };



  function captureBaselineFromDOM() {
    const activeDuration = document.querySelector(".duration-btn.active");

    if (activeDuration) {
      initialState.type = "temporary";
      initialState.hours = Number(activeDuration.dataset.hours);
      return;
    }

    if (manualBox.classList.contains("active")) {
      initialState.type = "manual";
      initialState.hours = null;
      return;
    }

    // nothing disabled
    initialState.type = null;
    initialState.hours = null;
  }


  // detect initial active state from DOM
  const activeDuration = document.querySelector(".duration-btn.active");

  if (activeDuration) {
    initialState.type = "temporary";
    initialState.hours = Number(activeDuration.dataset.hours);
  }

  if (manualActive) {
    initialState.type = "manual";
    initialState.hours = null;
  }

  function isSameAsInitial(type, hours) {
    return (
      initialState.type === type &&
      initialState.hours === hours
    );
  }

  /* -------------------------
     helpers
  ------------------------- */
  function clearActionOnly() {
    selection.type = null;
    selection.hours = null;
    disableAction();
  }

  function enableAction() {
    actionBtn.classList.add("active");
    actionBtn.disabled = false;
  }

  function disableActionIfNotEnableMode() {
    if (actionBtn.classList.contains("enable")) return; // 🚫 do nothing
    actionBtn.classList.remove("active");
    actionBtn.disabled = true;
  }

  function syncActionButton(type, hours) {
    const isBaseline =
      initialState.type === type &&
      initialState.hours === hours;

    if (isBaseline && initialState.type !== null) {
      actionBtn.textContent = "Enable Ticket System";
      actionBtn.classList.add("active", "enable");
      actionBtn.disabled = false;
    } else {
      actionBtn.textContent = "Disable Ticket System";
      actionBtn.classList.remove("enable");
      actionBtn.classList.add("active");
      actionBtn.disabled = false;
    }
  }


  function disableAction() {
    actionBtn.classList.remove("active");
    actionBtn.disabled = true;
  }

  function clearSelections() {
    durationBtns.forEach(b => b.classList.remove("active"));
    manualBox.classList.remove("active");

    selection.type = null;
    selection.hours = null;

     disableActionIfNotEnableMode();
  }

  /* -------------------------
     selection handlers
  ------------------------- */
  function toggleDuration(btn) {
    const hours = Number(btn.dataset.hours);

    clearSelections();
    btn.classList.add("active");

    selection.type = "temporary";
    selection.hours = hours;

    syncActionButton("temporary", hours);
  }


  function toggleManual() {
    clearSelections();
    manualBox.classList.add("active");

    selection.type = "manual";
    selection.hours = null;

    syncActionButton("manual", null);
  }

  /* -------------------------
     API
  ------------------------- */

  async function disableTickets() {
    const payload = {
      community_slug: "{{ community_slug }}",
      mode: selection.type,
      hours: selection.type === "temporary" ? selection.hours : null

    };

    const res = await fetch("/api/community/tickets/disable", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": csrfToken
      },
      body: JSON.stringify(payload)
    });

    if (!res.ok) return;
    initialState.type = selection.type;
    initialState.hours = selection.hours;
    actionBtn.textContent = "Enable Ticket System";
    actionBtn.classList.add("active", "enable");
    actionBtn.disabled = false;

  }


  /* -------------------------
     listeners
  ------------------------- */

  durationBtns.forEach(btn => {
    btn.addEventListener("click", () => toggleDuration(btn));
  });

  manualBox.addEventListener("click", toggleManual);

  cancelBtn?.addEventListener("click", clearSelections);

  actionBtn.addEventListener("click", () => {
    if (!actionBtn.classList.contains("active")) return;

    // ENABLE FLOW
    if (actionBtn.textContent.toLowerCase().includes("enable")) {
      openModal(
        "Enable ticket system",
        "Tickets will become visible and accessible again.",
        enableTickets
      );
      return;
    }

    // DISABLE FLOW
    if (!selection.type) return;

    const message =
      selection.type === "manual"
        ? "Tickets will stay disabled until you manually re-enable them. Existing tickets are preserved."
        : `Tickets will be disabled for ${selection.hours} hour(s). Existing tickets are preserved.`;

    openModal(
      "Disable ticket system",
      message,
      disableTickets
    );
  });


  async function enableTickets() {
    const res = await fetch("/api/community/tickets/enable", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": csrfToken
      },
      body: JSON.stringify({
        community_slug: "{{ community_slug }}"
      })
    });

    if (!res.ok) return;
    initialState.type = null;
    initialState.hours = null;

    // 🔥 exit ENABLE mode
    actionBtn.textContent = "Disable Ticket System";
    actionBtn.classList.remove("enable");
    actionBtn.disabled = true;
    actionBtn.classList.remove("active"); 

    clearSelections();
  }


  /* -------------------------
     init
  ------------------------- */

  // If Flask already rendered it active → respect it
  if (actionBtn.classList.contains("active")) {
    actionBtn.disabled = false;
  } else {
    disableAction();
  }

  const modal = document.getElementById("ticketConfirmModal");
  const modalTitle = document.getElementById("modalTitle");
  const modalMessage = document.getElementById("modalMessage");
  const modalConfirm = document.getElementById("modalConfirm");
  const modalCancel = document.getElementById("modalCancel");

  function openModal(title, message, onConfirm) {
    modalTitle.textContent = title;
    modalMessage.textContent = message;

    modal.classList.add("show");

    modalConfirm.onclick = async () => {
      modal.classList.remove("show");
      await onConfirm();
    };

    modalCancel.onclick = () => {
      modal.classList.remove("show");
    };
  }

  captureBaselineFromDOM();

}
