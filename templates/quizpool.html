<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Youtube Join Button</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{
  font-family: "Inter", "Segoe UI", system-ui, sans-serif;

}


/* Make both containers same width */
.poll-task,
.popup-container {
    width: 100% !important;
    box-sizing: border-box;
}

 @media (max-width: 991px){

.poll-task,
.popup-container {
    width: 100% !important;
    box-sizing: border-box !important;
}
 }

/* Outer container */
.poll-task {
    position: relative;
    border: 1.5px solid rgba(255, 255, 255, 0.2);
    border-radius: 20px;
    padding: 50px 20px 20px;
}

/* Floating label above */
.wlabeled {
    position: absolute;
    top: -16px;
    left: 20px;
    background: #007bff; /* changed from red to blue for poll */
    color: white;
    font-size: 14px;
    padding: 6px 16px;
    border-radius: 50px;
    display: flex;
    align-items: center;
    font-weight: bold;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}

.wlabeled i {
    margin-right: 6px;
}





/* Popup container */
.popup-container {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 18px;
    padding: 20px 20px 30px;
    position: relative;
    color: white;
}

/* Upward arrow above container */
.popup-container::before {
    content: "";
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-bottom: 12px solid #222;
}

.popup-header {
    display: flex;
    align-items: center;
    font-weight: 700;
    font-size: 1.1rem;
    margin-bottom: 16px;
    gap: 10px;
}

.popup-header .iconpoll {
    background: #007bff;
    padding: 6px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.popup-header .iconpoll i {
    color: white;
    font-size: 18px;
}

.popup-actions {
    margin-left: auto;
    display: flex;
    gap: 15px;
}

.popup-actions button {
    background: transparent;
    border: none;
    cursor: pointer;
    color: #ccc;
    font-size: 18px;
}

.popup-actions button:hover {
    color: white;
}

.custom-radio {
   font-size: 0.9rem;
   font-weight: bold;
    margin-top: 14px;
    display: inline-block;
    margin-bottom: 0;
}

.poollyern {
    width: 90%;
    padding: 10px 14px;
    border-radius: 14px;
    margin-left: 6px;
    color: white;
    font-size: 1rem;
}

.optn{
    width: 90%;
    padding: 10px 14px;
    border-radius: 14px;
    margin-left: 6px;
    color: white;
    font-size: 1rem;
}



input[type="text"].error {
    border-color: #ff3b3b;
}

.error-message {
    color: #ff3b3b;
    font-size: 0.85rem;
    margin-top: 6px;
    font-weight: 600;
}


.liners {
    height: 0.5px;
    background-color: #2e65ff;
    border-radius: 1px;
    margin: 8px -20px; /* matches container's horizontal padding */
}

.youtubeCircle {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background-color: #ff0000;  /* blue circle always visible */
  margin: 10px auto;
  position: relative;
  overflow: hidden;
}

.youtubeCircle img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  position: absolute;
  top: 0;
  left: 0;
  display: none; /* hide image by default */
}
#YoulinkInput,
  #YourTextArea {
    background-color: transparent;
    border: none;           /* Remove border */
    outline: none;          /* Remove focus outline */
    font-size: 16px;
    padding: 8px;
    width: 100%;
    resize: none;           /* For textarea: remove resize handle if desired */
  }

  /* Optional: placeholder style */
  #YoulinkInput::placeholder,
  #YourTextArea::placeholder {
    color: #888;            /* Light gray placeholder text */
  }

  /* Optional: remove autofill background (Chrome) */
  input:-webkit-autofill {
    background-color: transparent !important;
    -webkit-box-shadow: 0 0 0px 1000px transparent inset;
    -webkit-text-fill-color: #000;
  }

  #YoulinkInput {
    background-color: transparent;
    border: none;
    outline: none;
    font-size: 16px;
    padding: 8px;
    width: 100%;
    color: aliceblue; /* text color when user types */
  }

  /* Make placeholder look like normal text */
  #YoulinkInput::placeholder {
    color: aliceblue;       /* same color as normal text */
    opacity: 1;        /* ensure placeholder is fully visible */
  }

  
    .mineoptions {
      margin-top: 15px;
      gap: 10px;
    }

    .optionnsy {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }

    .optionnsy input {
      flex: 1;
      margin-right: 8px;
    }

    .add-option {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      background: #333;
      border: none;
      color: #aaa;
      font-size: 14px;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .add-option:hover {
      background: #444;
      color: #fff;
    }
.spacinelement {
  display: flex;
  flex-direction: column;
  gap: 5px; /* spaces between each .mutiplespacing */
}


.mutiplespacing {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
}

.mutiplespacing .text .title {
    font-weight: bold;
    font-size: 12px;
}

.mutiplespacing .text .description {
    font-size: 13px;
    color: #888;
    margin-top: 3px;
}

/* Toggle switch styles */
.switch {
  position: relative;
  display: inline-block;
  width: 40px;
  height: 20px;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background-color: #ccc;
  transition: 0.3s;
  border-radius: 20px;
}

.slider:before {
  position: absolute;
  content: "";
  height: 16px;
  width: 16px;
  left: 2px;
  bottom: 2px;
  background-color: white;
  transition: 0.3s;
  border-radius: 50%;
}

input:checked + .slider {
  background-color: #4caf50;
}

input:checked + .slider:before {
  transform: translateX(20px);
}

.optn::placeholder {
  color: aliceblue;       /* same color as normal text */
  opacity: 1;        /* ensure placeholder is fully visible */
}

.optionnsy {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
  position: relative; /* <-- this fixes it */
}

.remove-option {
  position: absolute;
  top: 50%;
  right: 6px;
  transform: translateY(-50%);
  border: none;
  background: none;
  color: #aaa;
  font-size: 16px;
  cursor: pointer;
}

.remove-option:hover {
  color: red;
}
.polltit{
  font-weight: bold;
  font-size: 15px;
  color: aliceblue;

}
.polldesc{
  color: #787878;

}

.radio-group {
  display: flex;
  flex-direction: column;
  gap: 8;
  width: 100%; /* or any fixed width you want */
  font-family: Arial, sans-serif;
}

.custom-radio {
  display: inline-flex;       /* keep inline but still flex */
  align-items: center;
  padding: 12px;
  border: 0.1px solid #cccccc57;
  border-radius: 12px;
  background-color: transparent; /* dark background */
  color: #fff;
  cursor: pointer;
  transition: background-color 0.2s, border-color 0.2s;
  position: relative;
}

.custom-radio:hover {
  border-color: #888;
}

.custom-radio input {
  display: none; /* hide default radio button */
}

.radio-btn {
   flex: 0 0 16px;
  height: 16px;
  width: 16px;
  border: 2px solid #fff;
  border-radius: 50%;
  margin-right: 12px;
  position: relative;
}

.custom-radio input:checked + .radio-btn::after {
  content: '';
  position: absolute;
  top: 4px;
  left: 4px;
  width: 8px;
  height: 8px;
  background-color: #fff;
  border-radius: 50%;
}

.custom-radio input:checked {
  background-color: #444; /* optional: darker background when selected */
}

.custom-radio-other {
  position: relative;   /* needed for absolute positioning */
  display: block;       /* full width */
  padding: 2.5px;
  border: 0.1px solid #cccccc57;
  border-radius: 12px;
  margin-top: 10px;
  background-color: transparent;
}
/* hide the input regardless of type */
.custom-radio-other input[type="radio"],
.custom-radio-other input[type="checkbox"] {
  display: none;
}

/* the visual button */
.custom-radio-other .radio-btn {
  height: 16px;
  cursor: pointer;
  margin-left: 8px;
  width: 16px;
  border: 2px solid #fff;
  border-radius: 50%; /* keep it circle even if it's a checkbox */
  position: relative;
}

/* checked state for both radio and checkbox */
.custom-radio-other input[type="radio"]:checked + .radio-btn::after,
.custom-radio-other input[type="checkbox"]:checked + .radio-btn::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 8px;
  height: 8px;
  background-color: #fff;
  border-radius: 50%;
}

.custom-radio-other .other-input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: white;
  font-size: 14px;
}

.other-input::placeholder{
  color: rgba(240, 248, 255, 0.484);
}
.marginpoll{
  margin-left: 13px
}
/* Hidden by default */
#otherOption {
  display: none;
}

.pollcontainer {
  text-align: right;
}

#pollitems{
  background-color: transparent;
  border: none;
  color: #2e65ff;
}

#pollitems:hover{
  background-color: #2c2c2c;
  border-radius: 30%;
}
</style>
</head>
<body>
<div style="outline: none; display: flex; justify-content: center; align-items: center;  flex-direction: column;">

<div  data-type="poll" class="outer-box poll-task">
  <div class="wlabeled" style="display: flex; gap: 8px;">
<svg xmlns="http://www.w3.org/2000/svg"  width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
  <path d="M6 3.6C4.7 3.6 3.6 4.7 3.6 6V18C3.6 19.3 4.7 20.4 6 20.4H18C19.3 20.4 20.4 19.3 20.4 18V6C20.4 4.7 19.3 3.6 18 3.6H6zM8.1 10.8C8.6 10.8 9 11.3 9 11.7V16.2C9 16.7 8.6 17.1 8.1 17.1C7.6 17.1 7.2 16.7 7.2 16.2V11.7C7.2 11.3 7.6 10.8 8.1 10.8zM15 14C15 13.2 15.4 12.8 16 12.8C16.6 12.8 17 13.2 17 14V16.2C17 16.7 16.6 17.1 16 17.1C15.4 17.1 15 16.7 15 16.2V14zM12 7.2C12.4 7.2 12.9 7.6 12.9 8.1V16.2C12.9 16.7 12.4 17.1 12 17.1C11.6 17.1 11.1 16.7 11.1 16.2V8.1C11.1 7.6 11.6 7.2 12 7.2z"/>
</svg> Pol
  </div>

  <div class="polltit"></div>
  <div class="polldesc"></div>

  <div class="radio-group"> 
    <label class="custom-radio">
      <input type="checkbox" value="option1">
      <span class="radio-btn"></span>
      <span>Option 1</span>
    </label>

    <label class="custom-radio">
      <input type="checkbox" value="option2">
      <span class="radio-btn"></span>
      <span>Option 2</span>
    </label>
  </div>

  <label id="otherOption" class="custom-radio-other">
    <input type="radio" name="single-choice" value="other">

    <div class="marginpoll">
      <input type="text" class="other-input" style="width: 90%; padding: 8px 14px; border-radius: 14px; margin-left: 1px; color: white; font-size: 1rem;"  placeholder="Other (please specify)" />
    </div>
  </label>

  

</div>

<div class="popup-container" role="dialog" aria-label="Poll editor">
  <div class="popup-header">
    <div class="iconpoll">
<svg xmlns="http://www.w3.org/2000/svg"  width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
  <path d="M6 3.6C4.7 3.6 3.6 4.7 3.6 6V18C3.6 19.3 4.7 20.4 6 20.4H18C19.3 20.4 20.4 19.3 20.4 18V6C20.4 4.7 19.3 3.6 18 3.6H6zM8.1 10.8C8.6 10.8 9 11.3 9 11.7V16.2C9 16.7 8.6 17.1 8.1 17.1C7.6 17.1 7.2 16.7 7.2 16.2V11.7C7.2 11.3 7.6 10.8 8.1 10.8zM15 14C15 13.2 15.4 12.8 16 12.8C16.6 12.8 17 13.2 17 14V16.2C17 16.7 16.6 17.1 16 17.1C15.4 17.1 15 16.7 15 16.2V14zM12 7.2C12.4 7.2 12.9 7.6 12.9 8.1V16.2C12.9 16.7 12.4 17.1 12 17.1C11.6 17.1 11.1 16.7 11.1 16.2V8.1C11.1 7.6 11.6 7.2 12 7.2z"/>
</svg>
    </div>
    <div class="title">Poll</div>
    <div class="popup-actions">
      <button title="Copy link">
        <i class="far fa-clipboard"></i>

      <button title="Delete link">
        <i class="fas fa-trash-alt"></i>
      </button>

  <div class="liners"></div>

  <!-- Title -->
  <input  id="YoulinkInput" class="js-title-input" type="text" placeholder="Enter the title of your poll..." style="color: aliceblue;" />

  <!-- Description -->
  <textarea id="YourTextArea" class="js-desc-input" placeholder="Type your poll description..." style="color: #787878;"></textarea>

  <div class="pollcontainer">
    <button id="pollitems" class="js-toggle-options">
      <i class="fas fa-chevron-up"></i>

  <div class="addingtiming js-options-section">

      <div class="optionnsy">
        <input type="text" class="optn"  style="background-color: transparent; border: 0.1px solid #cccccc57;" placeholder="Option 1" />
        <button class="remove-option">&times;</button>
      </div>
      <div class="optionnsy">
        <input type="text" class="optn"  style="background-color: transparent; border: 0.1px solid #cccccc57;" placeholder="Option 2" />
        <button class="remove-option">&times;</button>

  <div class="spacinelement">

        <div class="description">Allow users to enter a custom option.</div>

        <input type="checkbox" class="js-other-toggle">
        <span class="slider"></span>
      </label>
    </div>

</div>


<script>
(root => {
  const titleInput   = root.querySelector(".js-title-input");
  const descInput    = root.querySelector(".js-desc-input");
  const titlePreview = root.querySelector(".polltit");
  const descPreview  = root.querySelector(".polldesc");

  const radioGroup   = root.querySelector(".radio-group");
  const optionsWrap  = root.querySelector(".options-container");
  const addBtn       = root.querySelector(".add-option");
  const multiToggle  = root.querySelector(".js-multi-toggle");
  const otherToggle  = root.querySelector(".js-other-toggle");
  const otherOption  = root.querySelector(".custom-radio-other");
  const toggleBtn    = root.querySelector(".js-toggle-options");
  const optionsSec   = root.querySelector(".js-options-section");

  // ✍️ Live preview
  if (titleInput && titlePreview) {
    titleInput.addEventListener("input", () => {
      titlePreview.textContent = titleInput.value;
    });
  }
  if (descInput && descPreview) {
    descInput.addEventListener("input", () => {
      descPreview.textContent = descInput.value;
    });
  }

  // 🔀 Enforce radio/checkbox type
  function enforceSelectionType() {
    const inputs = radioGroup.querySelectorAll(".custom-radio input");
    inputs.forEach(inp => {
      if (multiToggle.checked) {
        inp.setAttribute("type", "checkbox");
        inp.removeAttribute("name");
      } else {
        inp.setAttribute("type", "radio");
        inp.setAttribute("name", "single-choice");
      }
    });

    // Handle "Other" option separately
    const otherRadio = otherOption.querySelector("input");
    if (otherRadio) {
      if (multiToggle.checked) {
        otherRadio.setAttribute("type", "checkbox");
        otherRadio.removeAttribute("name");
      } else {
        otherRadio.setAttribute("type", "radio");
        otherRadio.setAttribute("name", "single-choice");
      }
    }
  }

  // 🔄 Renumber + sync labels
  function renumberOptions() {
    const inputs = optionsWrap.querySelectorAll(".optn");
    const labels = radioGroup.querySelectorAll(".custom-radio span:last-child");
    inputs.forEach((inp, i) => {
      inp.placeholder = `Option ${i + 1}`;
      if (labels[i]) labels[i].textContent = inp.value || `Option ${i + 1}`;
    });
    enforceSelectionType();
  }

  // ➕ Add option
  addBtn?.addEventListener("click", () => {
    const index = optionsWrap.querySelectorAll(".optionnsy").length + 1;
    const div = document.createElement("div");
    div.classList.add("optionnsy");
    div.innerHTML = `
      <input type="text" style="background-color: transparent; border: 0.1px solid #cccccc57;" class="optn" placeholder="Option ${index}" />
      <button class="remove-option">&times;</button>`;
    optionsWrap.appendChild(div);

    const label = document.createElement("label");
    label.classList.add("custom-radio");
    label.innerHTML = `
      <input type="${multiToggle.checked ? "checkbox" : "radio"}" 
             name="${multiToggle.checked ? "" : "single-choice"}" 
             value="option${index}">
      <span class="radio-btn"></span>
      <span>Option ${index}</span>`;
    radioGroup.appendChild(label);
    renumberOptions();
  });

  // ❌ Remove option
  optionsWrap?.addEventListener("click", e => {
    if (e.target.classList.contains("remove-option")) {
      const idx = [...optionsWrap.children].indexOf(e.target.parentElement);
      e.target.parentElement.remove();
      if (radioGroup.children[idx]) radioGroup.children[idx].remove();
      renumberOptions();
    }
  });

  // ✍️ Live sync input → label
  optionsWrap?.addEventListener("input", e => {
    if (e.target.classList.contains("optn")) {
      const inputs = [...optionsWrap.querySelectorAll(".optn")];
      const idx = inputs.indexOf(e.target);
      const labels = radioGroup.querySelectorAll(".custom-radio span:last-child");
      if (labels[idx]) labels[idx].textContent = e.target.value || `Option ${idx + 1}`;
    }
  });

  // 🔀 Toggles
  multiToggle?.addEventListener("change", enforceSelectionType);
  otherToggle?.addEventListener("change", () => {
    otherOption.style.display = otherToggle.checked ? "flex" : "none";
  });

  toggleBtn?.addEventListener("click", () => {
    const chevron = toggleBtn.querySelector("i");
    const isHidden = window.getComputedStyle(optionsSec).display === "none";
    optionsSec.style.display = isHidden ? "block" : "none";
    chevron.classList.toggle("fa-chevron-down", !isHidden);
    chevron.classList.toggle("fa-chevron-up", isHidden);
  });

  // Init
  renumberOptions();
  enforceSelectionType(); // ✅ make sure first 2 options respect toggle state

  // 🎨 Position radio-dot beside "Other" input
  const radioBtn = otherOption.querySelector(".radio-btn");
  const textInput = otherOption.querySelector(".other-input");
  if (radioBtn && textInput) {
    radioBtn.style.position = "absolute";
    radioBtn.style.left = "6px";
    radioBtn.style.top = "50%";
    radioBtn.style.transform = "translateY(-50%)";
    textInput.style.paddingLeft = "26px";
  }
})(root);
</script>
