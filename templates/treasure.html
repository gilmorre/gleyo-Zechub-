<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Neo Card UI</title>

<style>
:root{
  --bg:#050505;
  --card:#0a0a0a;
  --neon:#22f5a3;
  --neon-soft:#22f5a350;
  --text:#eaeaea;
  --muted:#9aa0a6;
}

*{
  box-sizing:border-box;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at 20% 20%, #0b1a12 0%, transparent 40%),
    radial-gradient(circle at 80% 80%, #081410 0%, transparent 40%),
    var(--bg);
  display:flex;
  align-items:center;
  justify-content:center;
}

/* =====================
   NEON FRAME
===================== */
.neo-frame{
  position:relative;
  padding:1px;
  border-radius:24px;
  background:
    linear-gradient(120deg,
      transparent 20%,
      var(--neon) 50%,
      transparent 80%);
}

/* glow */
.neo-frame::before{
  content:"";
  position:absolute;
  inset:-20px;
  background:
    radial-gradient(circle at 30% 20%, var(--neon-soft), transparent 60%);
  filter: blur(40px);
  z-index:-1;
}

/* =====================
   CARD
===================== */
.neo-card{
  width:640px;
  height:320px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.04), transparent 40%),
    rgba(10,10,10,0.9);
  backdrop-filter: blur(6px);
  border-radius:23px;
  position:relative;
  padding:32px;
  overflow:hidden;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.04),
    0 30px 80px rgba(0,0,0,0.8);
}

/* =====================
   FLOAT TAG
===================== */
.neo-tag{
  position:absolute;
  top:18px;
  left:24px;
  padding:6px 14px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
  letter-spacing:.4px;
  color:#001f14;
  background:linear-gradient(180deg,#2cffb2,#16c784);
  box-shadow:
    0 0 20px rgba(34,245,163,0.5),
    inset 0 1px 0 rgba(255,255,255,0.5);
}

/* =====================
   CONTENT
===================== */
.neo-content{
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:18px;
}

/* avatar */
.neo-avatar{
  width:72px;
  height:72px;
  border-radius:50%;
  background:
    linear-gradient(135deg,#7c3aed,#22f5a3);
  box-shadow:
    0 0 0 4px rgba(255,255,255,0.03),
    0 0 40px rgba(124,58,237,0.4);
}

/* title */
.neo-title{
  color:var(--text);
  font-size:22px;
  font-weight:600;
  letter-spacing:.3px;
}

/* subtitle */
.neo-sub{
  color:var(--muted);
  font-size:13px;
}

/* =====================
   BUTTON
===================== */
.neo-btn{
  margin-top:22px;
  width:88%;
  height:56px;
  border-radius:16px;
  border:none;
  cursor:pointer;

  background:
    linear-gradient(135deg,#22f5a3,#1ec98b);

  color:#04281a;
  font-size:16px;
  font-weight:700;
  letter-spacing:.3px;

  box-shadow:
    0 0 0 1px rgba(255,255,255,0.2) inset,
    0 12px 30px rgba(34,245,163,0.45),
    0 0 40px rgba(34,245,163,0.35);

  transition:.3s ease;
}

.neo-btn:hover{
  transform:translateY(-2px) scale(1.01);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.3) inset,
    0 18px 50px rgba(34,245,163,0.6),
    0 0 60px rgba(34,245,163,0.5);
}

.neo-btn:active{
  transform:translateY(0) scale(0.99);
}
</style>
</head>

<body>

<div class="neo-frame">
  <div class="neo-card">

    <div class="neo-tag">⚡ Partnership</div>

    <div class="neo-content">
      <div class="neo-avatar"></div>
      <div class="neo-title">Nova Protocol</div>
      <div class="neo-sub">Community access portal</div>
      <button class="neo-btn">Enter Platform</button>
    </div>

  </div>
</div>

</body>
</html>
