                </a>
                <button type="button" id="backFromEmail" class="back-btn-header" onclick="closeEmailView()">
                    <svg xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                        width="16"
                        height="16"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2.5"
                        stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M15 18l-6-6 6-6"/>
                    </svg>
                    Back
                </button>
            </div>
            <div class="top-right">
                <a href="/create-account"
                   data-path="/create-account"
                   onclick="event.preventDefault(); loadAuth(this.dataset.path)"
                   class="auth-link create-account-btn create-account">

        </div>

                            </svg>
                            Log in with Discord
                        </a>

                        <span class="liner"></span>
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 26px;">

                        <button type="button" class="discord-btn alt-expand-btn" id="continueEmailBtn" onclick="openEmailView()" style="outline: none; cursor: pointer;">

                                </g>
                            </svg>
                            Continue with Email
                        </button>

                    </div>
                </div>

                <div id="email-view" style="display:none;">

                    <fieldset class="email-fieldset" id="emailFieldset">
                        <legend id="legend">Enter address</legend>
                        <input type="email" id="aboutBox" autocomplete="off" name="box" placeholder="james@gmail.com">
                    </fieldset>

                    <p class="inavid-email"></p>

                    <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">

                    <button type="button" id="loginBtn" class="main-login-btn">
                        Log In
                    </button>
                </div>

                {% if flash_message %}
                <div class="flash-container">
                    <div class="flash {{ flash_category }}">
                        {{ flash_message }}
                        <span class="flash-close" onclick="closeFlash(this)">
                            ✕
                        </span>
                    </div>
                </div>
                {% endif %}

            </div>
        </div>

    </div>
</div>

<script src="{{ url_for('static', filename='loginoauth.js') }}"></script>
</body>
</html>
