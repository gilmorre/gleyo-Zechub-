<!-- Web3Modal v2 Standalone -->
<script src="https://unpkg.com/@walletconnect/modal@2.6.2/dist/index.umd.js" defer></script>
<script src="https://unpkg.com/ethers@5.7.2/dist/ethers.umd.min.js" defer></script>
<button id="connectWalletBtn" class="wallet-btn">
  Connect Wallet
</button>
<p id="walletAddress" class="wallet-address"></p>
<script>
  // Project ID from WalletConnect cloud (free to get one at https://cloud.walletconnect.com)
  const projectId = "YOUR_WALLETCONNECT_PROJECT_ID";

  // Initialize WalletConnect modal
  const modal = new window.WalletConnectModal.WalletConnectModal({
    projectId,
    chains: [1, 137, 56], // Ethereum, Polygon, BSC (you can add more)
  });

  // Connect wallet function
  async function connectWallet() {
    try {
      const session = await modal.connect();
      const account = session.namespaces.eip155.accounts[0];
      const address = account.split(":")[2];

      document.getElementById("walletAddress").textContent =
        "✅ Connected: " + address;
    } catch (err) {
      console.error("Connection failed", err);
    }
  }

  document
    .getElementById("connectWalletBtn")
    .addEventListener("click", connectWallet);
</script>
