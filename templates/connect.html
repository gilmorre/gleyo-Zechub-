<!DOCTYPE html>
<html>
<head>
  <title>My Web3 App</title>
  <script src="https://unpkg.com/@walletconnect/sign-client@2.10.5/dist/index.umd.js"></script>
  <script src="https://unpkg.com/@walletconnect/qrcode-modal@2.1.2/dist/index.umd.js"></script>
</head>
<body>
  <button id="connectBtn">Connect Wallet</button>

  <script>
    async function connectWallet() {
      const client = await window.WalletConnectSignClient.init({
        projectId: "YOUR_PROJECT_ID",   // replace with your WalletConnect Cloud project ID
        relayUrl: "wss://relay.walletconnect.com",
        metadata: {
          name: "My Flask dApp",
          description: "A Flask + WalletConnect demo",
          url: "http://127.0.0.1:5000",
          icons: ["https://walletconnect.com/walletconnect-logo.png"]
        }
      });

      const { uri, approval } = await client.connect({
        requiredNamespaces: {
          eip155: {
            methods: ["eth_sendTransaction", "personal_sign"],
            chains: ["eip155:1"], // Ethereum Mainnet
            events: ["accountsChanged", "chainChanged"]
          }
        }
      });

      if (uri) {
        // Show the QR code modal (the one you uploaded!)
        window.WalletConnectQRCodeModal.open(uri, () => {
          console.log("QR Code closed");
        });
      }

      const session = await approval();
      console.log("Wallet connected:", session);
    }

    document.getElementById("connectBtn").addEventListener("click", connectWallet);
  </script>
</body>
</html>
