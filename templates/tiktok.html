<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiktok Join Button</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>

/* Make both containers same width */
.outer-box,
.popup-container {
    width: 100% !important;
    box-sizing: border-box;
}

/* Outer container */
.outer-box {
    position: relative;
    border: 1.5px solid rgba(255, 255, 255, 0.2);
    border-radius: 20px;
    padding: 50px 20px 20px;
}
@media(max-width: 991px){
.outer-box,
.popup-container {
    width: 100% !important;
    box-sizing: border-box;
}

}
/* Floating label above */
.tiklabel {
    position: absolute;
    top: -16px;
    left: 20px;
    background: #000;
    color: white;
    font-size: 14px;
    padding: 6px 16px;
    border-radius: 50px;
    display: flex;
    align-items: center;
    font-weight: bold;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}

.tiklabel i {
    margin-right: 6px;
}

/* Join button */
.tiktokjoin-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: linear-gradient(90deg, #000, #000000ba);
    color: white;
    font-size: 16px;
    font-weight: bold;
    border-radius: 20px;
    padding: 18px;
    text-decoration: none;
    transition: background 0.3s ease;
}



/* Popup container */
.popup-container {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 18px;
    padding: 20px 20px 30px;
    position: relative;
    color: white;
}

/* Upward arrow above container */
.popup-container::before {
    content: "";
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-bottom: 12px solid #222;
}

.popup-header {
    display: flex;
    align-items: center;
    font-weight: 700;
    font-size: 1.1rem;
    margin-bottom: 16px;
    gap: 10px;
}

.popup-header .tikicon {
    background: #000;
    padding: 6px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.popup-header .icon i {
    color: white;
    font-size: 18px;
}

.popup-actions {
    margin-left: auto;
    display: flex;
    gap: 15px;
}

.popup-actions button {
    background: transparent;
    border: none;
    cursor: pointer;
    color: #ccc;
    font-size: 18px;
}

.popup-actions button:hover {
    color: white;
}

label {
   font-size: 0.7rem;
    margin-top: 23px;
    display: block;
    margin-bottom: 6px;
}

.idfys {
    width: 90%;
    padding: 10px 14px;
    border-radius: 14px;
    margin-left: 6px;
    border: 1.5px solid #555;
    background: #121212;
    color: white;
    font-size: 1rem;
}



input[type="text"]:focus {
    outline-color: #2e65ff;
    border-color: #2e65ff;
}

input[type="text"].error {
    border-color: #ff3b3b;
}

.error-message {
    color: #ff3b3b;
    font-size: 0.85rem;
    margin-top: 6px;
    font-weight: 600;
}


.liners {
    height: 0.5px;
    background-color: #2e65ff;
    border-radius: 1px;
    margin: 8px -20px; /* matches container's horizontal padding */
}

.tiktokCircle {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background-color: #050505;  /* blue circle always visible */
  margin: 10px auto;
  position: relative;
  overflow: hidden;
}

.tiktokCircle img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  position: absolute;
  top: 0;
  left: 0;
  display: none; /* hide image by default */
}



</style>
</head>
<body>

<div data-type="tiktok" class="outer-box tiktok-root">
  <div class="tiklabel">
    <i class="fab fa-tiktok"></i> TikTok
  </div>
  <div class="tiktokCircle">
    <img class="js-tiktok-img" alt="Profile picture" style="display:none;" />
    <div class="js-tiktok-fallback fallback-letter" style="display:none;"></div>
  </div>
  <a href="#" class="js-tiktok-join tiktokjoin-btn">
    <i class="fab fa-tiktok"></i> Follow
  </a>
</div>

<div class="popup-container" role="dialog" aria-label="Visit link">
  <div class="popup-header">
    <div class="tikicon">
      <i class="fa-brands fa-tiktok"></i>
    </div>
    <div class="title">TikTok</div>
    <div class="liner"></div>
    <div class="popup-actions">
      <button title="Copy link">
        <i class="far fa-clipboard"></i>
      </button>
      <button title="Delete link">
        <i class="fas fa-trash-alt"></i>
      </button>
    </div>
  </div>
  <div class="liners"></div>

  <label class="linkInput">Link you want your users to visit</label>
  <input name="tiktok_link" class="js-tiktok-input idfys" type="text" placeholder="https://" />
  <div class="js-tiktok-error error-message" style="display:none;">Invalid url</div>
</div>

<script>
/* loader runs with: new Function("root", code)(wrapper) */

const tiktokJoinBtn   = root.querySelector(".js-tiktok-join");
const tiktokInput     = root.querySelector(".js-tiktok-input");
const tiktokCircleImg = root.querySelector(".js-tiktok-img");
const tiktokFallback  = root.querySelector(".js-tiktok-fallback");
const tiktokError     = root.querySelector(".js-tiktok-error");

function extractTikTokUsername(url) {
  const match = url.match(/tiktok\.com\/@([a-zA-Z0-9._]+)/i);
  return match ? match[1] : null;
}

async function fetchTikTokInfo(username) {
  try {
    const res = await fetch(`/api/tiktok_info?username=${encodeURIComponent(username)}`);
    if (!res.ok) return null;
    const data = await res.json();
    return {
      name: data.name,
      avatar: data.avatar,
      followers: data.followers
    };
  } catch (err) {
    console.error("Error fetching TikTok info:", err);
    return null;
  }
}

async function updateTikTokJoin() {
  const url = tiktokInput.value.trim();
  const username = extractTikTokUsername(url);

  tiktokCircleImg.style.display = "none";
  tiktokFallback.style.display = "none";
  tiktokError.style.display = "none";
  tiktokJoinBtn.innerHTML = `<i class="fab fa-tiktok"></i> Follow`;

  if (!username) {
    tiktokError.style.display = "block";
    return;
  }

  const info = await fetchTikTokInfo(username);
  if (info && info.name) {
    tiktokJoinBtn.innerHTML = `<i class="fab fa-tiktok"></i> Follow ${info.name}`;
    if (info.avatar) {
      tiktokCircleImg.src = info.avatar;
      tiktokCircleImg.style.display = "block";
    } else {
      tiktokFallback.textContent = info.name.charAt(0).toUpperCase();
      tiktokFallback.style.display = "flex";
    }
  } else {
    tiktokError.style.display = "block";
  }
}

tiktokInput.addEventListener("input", updateTikTokJoin);

tiktokJoinBtn.addEventListener("click", e => {
  e.preventDefault();
  const username = extractTikTokUsername(tiktokInput.value.trim());
  if (username) {
    window.open(`https://www.tiktok.com/@${username}`, "_blank");
  }
});

// Initialize
updateTikTokJoin();
</script>



<style>
  .tiktokCircle {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background-color: #69C9D0; /* TikTok brand color */
    margin: 10px auto;
    position: relative;
    overflow: hidden;
  }
  #tiktokCircleImg {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    position: absolute;
    top: 0; left: 0;
  }
</style>
</body>
</html>
