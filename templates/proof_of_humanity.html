<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trophy Quest - Proof of Humanity</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
 
    .poh-root,
    .poh-popup {
      width: 100% !important;
      margin: 20px auto;
    box-sizing: border-box !important;

    }

    /* Outer container */
    .poh-root {
      position: relative;
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 50px 20px 20px;
      text-align: center;
    }

    /* Floating label above */
    .poh-label {
      background: linear-gradient(90deg, #2962ff, #1a237e);
      position: absolute;
      top: -16px;
      left: 20px;
      color: white;
      font-size: 14px;
      padding: 6px 16px;
      border-radius: 50px;
      display: flex;
      align-items: center;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    .poh-label i {
      margin-right: 6px;
    }

    /* Join button */
    .poh-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(90deg, #2979ff, #1565c0);
      color: white;
      font-size: 16px;
      font-weight: bold;
      border-radius: 20px;
      padding: 14px;
      text-decoration: none;
      transition: background 0.3s ease;
      margin-top: 16px;
    }

    .poh-btn:hover {
      background: linear-gradient(90deg, #1565c0, #0d47a1);
    }

    /* Proof of Humanity circle */
    .poh-circle {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(90deg, #2979ff, #1565c0);
      margin: 0 auto 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .poh-circle i {
      color: white;
      font-size: 28px;
    }

    /* Title + description */
    .poh-title {
      color: #fff;
      margin: 6px 0 4px;
      font-size: 1.1rem;
      line-height: 1.3;
    }

    .poh-subtitle {
      color: #c9c7c7;
      font-size: 14px;
      margin: 4px 0 0;
    }

    /* Popup container */
    .poh-popup {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 18px;
      padding: 20px 20px 30px;
      position: relative;
      color: white;
      margin-top: 24px;
    }

    .poh-popup::before {
      content: "";
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-bottom: 12px solid #222;
    }

    .popup-header {
      display: flex;
      align-items: center;
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 16px;
      gap: 10px;
    }

    .popup-header .poh-icon {
      background: linear-gradient(90deg, #2979ff, #1565c0);
      padding: 6px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .popup-header .poh-icon i {
      color: white;
      font-size: 18px;
    }

    .popup-actions {
      margin-left: auto;
      display: flex;
      gap: 15px;
    }

    .popup-actions button {
      background: transparent;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 18px;
    }

    .popup-actions button:hover {
      color: white;
    }

    .liners {
      height: 0.5px;
      background-color: #2979ff;
      border-radius: 1px;
      margin: 8px -20px;
    }
  </style>
</head>
