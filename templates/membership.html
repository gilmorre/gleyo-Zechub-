<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banned Modal</title>
<style>
  /* Reset & Base */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background-color: #1e1e2f;
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .banned-modal-container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 20px;
    padding: 30px 25px;
    width: 90%;
    max-width: 600px;
    text-align: center;
    color: #fff;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    animation: fadeIn 0.3s ease-in-out;
  }

.banned-go-home-btn {
    
    color: #fff;
  font-size: 1rem;
 
}
 

  .banned-modal-header img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    margin-bottom: 15px;
    object-fit: cover;
    border: 2px solid rgba(255,255,255,0.2);
  }

  .banned-modal-header h2 {
    font-size: 1.5rem;
    margin-bottom: 15px;
  }

  .banned-modal-message {
    font-size: 1rem;
    line-height: 1.5;
    margin-bottom: 25px;
    color: #e0e0e0;
  }

  .banned-modal-icons {
    display: flex;
    justify-content: center;
    gap: 20px;
  }

  .banned-modal-icons svg {
 
    fill: aliceblue;  
    transition: transform 0.2s;
    cursor: pointer;
  }

 
  @media (max-width: 991px) {
    .banned-modal-container {
      padding: 20px;
    }

    .banned-modal-header h2 {
      font-size: 1.25rem;
    }

    .banned-modal-message {
      font-size: 0.95rem;
    }

    .banned-modal-icons svg {
      width: 28px;
      height: 28px;
    }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translate(-50%, -45%); }
    to { opacity: 1; transform: translate(-50%, -50%); }
  }
</style>
</head>
<body>


</body>
</html>
