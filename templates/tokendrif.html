<div class="outer-box">
  <div class="label">
    <i class="fab fa-youtube"></i> NFT
  </div>
  <div id="nftround" class="nftround">
    <img id="nftroundImg" alt="NFT Image" />
  </div>

  <div class="nftmint">Own <span id="nftgems">1</span> <span id="nfttok"></span></div>
  <div class="modelsnft" id="nftdesc"></div>
  <a href="#" id="subscribe" class="join-btn">
    <i class="fab fa-youtube"></i> Open external link
  </a>
</div>

<div class="popup-container">
  <div class="spacenet">
    <div class="selnet">Network</div>
    <select id="blockchain">
      <option value="">Select Blockchain</option>
      <option value="eth">Ethereum</option>
      <option value="polygon">Polygon</option>
      <option value="bsc">Binance Smart Chain</option>
      <option value="avalanche">Avalanche</option>
      <option value="fantom">Fantom</option>
    </select>
  </div>

  <div class="spacenet">
    <div class="selnet">Contract Address</div>
    <input type="text" id="contadd" placeholder="Enter contract address">
  </div>

  <div class="spacenet">
    <div class="selnet">Token ID</div>
    <input type="text" id="tokenid" placeholder="Enter token ID">
  </div>

  <button id="fetchNFT">Load NFT</button>
</div>

<script>
const apiKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJub25jZSI6ImZlZmRhNzM0LTZjNTYtNDc1MC04OTI2LWFjZTE0MjJjNjc0OSIsIm9yZ0lkIjoiNDY1NjI0IiwidXNlcklkIjoiNDc5MDI3IiwidHlwZUlkIjoiYzZhNDA4NDQtODYzYS00YTIyLWFjN2UtODZlZGY5ZGJlYWM5IiwidHlwZSI6IlBST0pFQ1QiLCJpYXQiOjE3NTU0NDU2NDksImV4cCI6NDkxMTIwNTY0OX0.LPmvqSgNxZUUqIw-l_XNZdGLc2sDy-v-zdP-I-2OO0s";

const blockchainSelect = document.getElementById("blockchain");
const contractInput = document.getElementById("contadd");
const tokenInput = document.getElementById("tokenid");
const fetchBtn = document.getElementById("fetchNFT");

const nftImg = document.getElementById("nftroundImg");
const nftName = document.getElementById("nfttok");
const nftDesc = document.getElementById("nftdesc");
const subscribeLink = document.getElementById("subscribe");

fetchBtn.addEventListener("click", async () => {
  const chain = blockchainSelect.value;
  const contract = contractInput.value.trim();
  const tokenId = tokenInput.value.trim();

  if (!chain || !contract || !tokenId) {
    alert("Please select blockchain, enter contract and token ID.");
    return;
  }

  const apiURL = `https://deep-index.moralis.io/api/v2/nft/${contract}/${tokenId}?chain=${chain}&format=decimal`;

  try {
    const res = await fetch(apiURL, {
      headers: { "X-API-Key": apiKey }
    });

    const data = await res.json();
    const metadata = data.metadata ? JSON.parse(data.metadata) : null;

    if (metadata) {
      nftImg.src = metadata.image || "";
      nftImg.style.display = "block";
      nftName.textContent = metadata.name || "";
      nftDesc.textContent = metadata.description || "";
      subscribeLink.href = `https://opensea.io/assets/${chain}/${contract}/${tokenId}`;
    } else {
      nftImg.style.display = "none";
      nftName.textContent = "";
      nftDesc.textContent = "";
      subscribeLink.href = "#";
      alert("NFT metadata not found");
    }
  } catch (err) {
    console.error(err);
    alert("Error fetching NFT");
  }
});
</script>
