<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Supermeme Challenge</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #0d1117; /* dark navy background */
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 30px;
      width: 400px;
      height: 700px; /* taller card */
      background: #161b22; /* slightly lighter than body */
      color: #e6edf3;
      padding: 50px 35px;
      border-radius: 20px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.6);
      justify-content: space-between;
    }

    .section {
      background-color: #21262d;
      padding: 25px;
      border-radius: 12px;
    }

    .header h1 {
      margin: 0 0 12px;
      font-size: 1.9em;
      text-align: center;
      color: #58a6ff; /* blue accent */
    }

    .status {
      margin: 0;
      font-size: 1em;
      text-align: center;
      color: #79c0ff;
    }

    .status span {
      color: #8b949e;
      margin-left: 6px;
    }

    .details h2,
    .rewards h2 {
      margin: 0 0 10px;
      font-size: 1.4em;
      color: #c9d1d9;
    }

    .details p {
      margin: 0;
      font-size: 1.05em;
      line-height: 1.7;
      color: #b1bac4;
    }

    .reward-amount {
      margin: 15px 0 0;
      font-size: 2.4em;
      text-align: center;
      font-weight: bold;
      color: #f9d342;
    }

    .footer {
      text-align: center;
      font-size: 0.9em;
      color: #6e7681;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="section header">
      <h1>Supermeme Challenge</h1>
      <p class="status">Status: Active <span>(July 16 – August 16)</span></p>
    </div>
    <div class="section details">
      <h2>What’s This About?</h2>
      <p>Unleash your inner meme lord! Craft the funniest, wittiest memes that capture the internet’s imagination. Surprise us, break the mold, and rise to the top!</p>
    </div>
    <div class="section rewards">
      <h2>Grand Prize</h2>
      <p class="reward-amount">$10,000</p>
    </div>
    <div class="footer">
      Powered by MemeLab · Terms Apply
    </div>
  </div>
</body>
</html>
