<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Youtube Join Button</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body {
    background-color: #1c1c1e;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 50px;
}

/* Make both containers same width */
.outer-box,
.popup-container {
    width: 440px;
}
 @media (max-width: 991px){

.outer-box,
.popup-container {
    width: 100% !important;
    box-sizing: border-box !important;
}
 }
/* Outer container */
.outer-box {
    position: relative;
    border: 1.5px solid rgba(255, 255, 255, 0.2);
    border-radius: 20px;
    padding: 50px 20px 20px;
}

/* Floating label above */
.label {
    position: absolute;
    top: -16px;
    left: 20px;
    background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    color: white;
    font-size: 14px;
    padding: 6px 16px;
    border-radius: 50px;
    display: flex;
    align-items: center;
    font-weight: bold;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}

.label i {
    margin-right: 6px;
}

/* Join button */
.join-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    color: white;
    font-size: 16px;
    font-weight: bold;
    border-radius: 20px;
    padding: 18px;
    text-decoration: none;
    transition: background 0.3s ease;
}



/* Popup container */
.popup-container {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 18px;
    padding: 20px 20px 30px;
    position: relative;
    color: white;
}

/* Upward arrow above container */
.popup-container::before {
    content: "";
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-bottom: 12px solid #222;
}

.popup-header {
    display: flex;
    align-items: center;
    font-weight: 700;
    font-size: 1.1rem;
    margin-bottom: 16px;
    gap: 10px;
}

.popup-header .icon {
    background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    padding: 6px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.popup-header .icon i {
    color: white;
    font-size: 18px;
}

.popup-actions {
    margin-left: auto;
    display: flex;
    gap: 15px;
}

.popup-actions button {
    background: transparent;
    border: none;
    cursor: pointer;
    color: #ccc;
    font-size: 18px;
}

.popup-actions button:hover {
    color: white;
}

.instagram-header{
   font-size: 0.7rem;
    margin-top: 23px;
    display: block;
    margin-bottom: 6px;
}

input[type="text"] {
    width: 90%;
    padding: 10px 14px;
    border-radius: 14px;
    margin-left: 6px;
    border: 1.5px solid #555;
    background: #121212;
    color: white;
    font-size: 1rem;
}



input[type="text"]:focus {
    outline-color: #2e65ff;
    border-color: #2e65ff;
}

input[type="text"].error {
    border-color: #ff3b3b;
}

.error-message {
    color: #ff3b3b;
    font-size: 0.85rem;
    margin-top: 6px;
    font-weight: 600;
}


.liners {
    height: 0.5px;
    background-color: #2e65ff;
    border-radius: 1px;
    margin: 8px -20px; /* matches container's horizontal padding */
}


</style>
</head>
<body>

<div class="outer-box">
    <div class="label">
        <i class="fab fa-instagram"></i> Instagram
    </div>
    <a href="#" class="join-btn">
        <i class="fab fa-instagram"></i> Join the " server
    </a>
</div>

<div class="popup-container" role="dialog" aria-label="Visit link">
  <div class="popup-header">
    <div class="icon">
      <i class="fa-brands fa-instagram"></i>
    </div>
    <div class="title">Instagram</div>
    <div class="liner"></div>
    <div class="popup-actions">
      <button title="Copy link">
        <i class="far fa-clipboard"></i>
      </button>
      <button title="Delete link">
        <i class="fas fa-trash-alt"></i>
      </button>
    </div>
  </div>
  <div class="liners"></div>
  <label class="linkInput instagram-header" for="linkInput">Link you want your users to visit</label>
  <input id="linkInput" class="error" type="text" placeholder="https://" />
  <div id="errorMessage" class="error-message">Invalid url</div>
</div>

</body>
</html>
