<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Typing Indicator</title>
<style>

.typing-bubble {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  background-color: #e5e5ea;
  border-radius: 20px;
  padding: 5px 6px;
  width: 50px;
  height: 28px;
}
.typing-bubble::before {
  content: "";
  position: absolute;
  bottom: -4px;
  left: -2px;
  width: 13px;
  height: 13px;
  background-color: #e5e5ea;
  border-radius: 50%;
}
.dot {
  width: 7px;
  height: 7px;
  margin: 0 2px;
  border-radius: 50%;
  background-color: #888;
  animation: bounce 1s infinite ease-in-out;
}
.dot:nth-child(1) { animation-delay: 0s; background-color: #bdbdbf; }
.dot:nth-child(2) { animation-delay: 0.15s; background-color: #a7a7aa; }
.dot:nth-child(3) { animation-delay: 0.3s; background-color: #8e8e91; }
body.dark {
  background-color: #121212;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
body.dark .typing-bubble {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  background-color: #2a2a2e;
  border-radius: 20px;
  padding: 5px 6px;
  width: 50px;
  height: 28px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.3);
}
body.dark .typing-bubble::before {
  content: "";
  position: absolute;
  bottom: -4px;
  left: -2px;
  width: 13px;
  height: 13px;
  background-color: #2a2a2e;
  border-radius: 50%;
}
body.dark .dot {
  width: 7px;
  height: 7px;
  margin: 0 2px;
  border-radius: 50%;
  background-color: #aaa;
  animation: bounce 1s infinite ease-in-out;
}
body.dark .dot:nth-child(1) { animation-delay: 0s; background-color: #d0d0d3; }
body.dark .dot:nth-child(2) { animation-delay: 0.15s; background-color: #b5b5b9; }
body.dark .dot:nth-child(3) { animation-delay: 0.3s; background-color: #99999d; }
@keyframes bounce {
  0%, 70%, 100% {
    transform: translateY(0);
    opacity: 0.4;
  }
  35% {
    transform: translateY(-6px);
    opacity: 1;
  }
}
</style>
</head>
<body>

<div class="typing-bubble">
  <span class="dot"></span>
  <span class="dot"></span>
  <span class="dot"></span>
</div>

</body>
</html>
