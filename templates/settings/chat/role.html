<style>
/* PANEL */


@media (min-width: 768px) {
  .roles-panel {
    background: var(--bg-sidebar);
    padding: 20px 12px;
    padding-top: 34px;
    max-width: 520px;
    min-width: 520px;
  }
}


@media (max-width: 768px) {
  .roles-panel {
    background: var(--bg-sidebar);
    padding: 20px 6px;
    padding-top: 34px;
    max-width: 100%;
    width: 100%;
  }
}

/* HEADER */
.roles-header {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 14px;
}

.roles-header h3 {
  margin: 0;
  font-size: 18px;
  color: var(--text-main);
}

.roles-header p {
  margin: 0;
  font-size: 13px;
  color: var(--text-muted);
}

.btn-create-role {
  margin-top: 8px;
  width: fit-content;
  background: var(--bg-active);
  border: 1px solid var(--bg-active-border);
  color: var(--text-main);
  padding: 8px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
}

.btn-create-role:hover {
  background: var(--bg-hover);
}

/* TABLE */
.roles-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

.roles-table thead th {
  text-align: left;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
}

.roles-table tbody tr:not(:last-child) {
  border-bottom: 0.9px solid var(--border);
}

.roles-table tbody tr:hover {
  background: var(--bg-hover-hover);
}

.roles-table td {
  padding: 19px;
  vertical-align: middle;
}

/* ROLE BADGE */
.role-badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 12px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 500;
  background: #3030506c;
  border: 1px solid transparent;
  white-space: nowrap;
}

/* MEMBERS */
.role-count {
  text-align: center;
  font-size: 13px;
  color: var(--text-main-items);
}

/* COLOR CELL */
.role-color {
  display: flex;
  align-items: center;
  gap: 10px;
}

.role-color-box {
  width: 32px;
  height: 20px;
  border-radius: 6px;
  background: currentColor;
  border: 2px solid currentColor;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.4);
}

.role-color-hex {
  font-size: 12px;
  font-family: monospace;
  color: var(--text-muted);
}

.roles-table th:last-child,
.roles-table td:last-child {
  text-align: right;
  padding-right: 20px;
}


.uitent{
  position: relative;
  left: -9px;
}


.roles-table td:last-child .role-color {
  justify-content: flex-end;
}


/* COLOR PICKER POPOVER */
.color-picker {
  position: absolute;
  z-index: 1000;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
}

.color-picker.hidden {
  display: none;
}

.color-swatch {
  width: 25px;
  height: 25px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid rgba(255,255,255,0.15);
}

.color-swatch:hover {
  transform: scale(1.1);
}



.color-swatch-svg {
  display: flex;
  border: none !important;
  background-color: transparent !important;
  align-items: center;
  margin-left: auto;
  justify-content: center;
  background: var(--bg-hover);
  color: var(--text-muted);
}

.color-swatch-svg svg{
  width: 20px;
  flex-shrink: 0;
  height: 20px;

}
.color-swatch-svg:hover {
  color: var(--text-main);
  background: var(--bg-active);
}



/* ===== MODAL ROOT ===== */
.advanced-color-modal {
  position: fixed;
  inset: 0;
  z-index: 9999;
}

/* ===== DARK TRANSPARENT OVERLAY ===== */
.ac-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.65);
}

/* ===== FLOATING GLASS PANEL (NEVER FULLSCREEN) ===== */
.ac-panel {
  position: absolute;
  inset: 0;
  margin: auto;

  width: min(360px, 92vw);
  height: min(520px, 85vh);

  background: rgba(34, 34, 54, 0.448);
  backdrop-filter: blur(5px);
  border: 0.9px solid var(--border);

  border-radius: 16px;
  padding: 18px;

  display: flex;
  flex-direction: column;

  /* subtle glass border + shadow */
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow:
    0 20px 60px rgba(0, 0, 0, 0.45),
    inset 0 1px 0 rgba(255, 255, 255, 0.05);
}


/* ===== HEADER (ADMIN VERY HIGH & CENTERED) ===== */
.ac-header {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 6px;
}

.ac-role {
  all: unset;
  box-sizing: content-box;

  display: inline-block;
  flex: 0 0 auto;

  padding: 6px 16px;
  border-radius: 999px;
  border: 1px solid currentColor;

  font-size: 15px;
  line-height: 1.6;
  text-align: center;

  white-space: nowrap;
  caret-color: currentColor;
}



/* focus ring */
.ac-role:focus {
  box-shadow: 0 0 0 2px
    color-mix(in srgb, currentColor 30%, transparent);
}

/* disabled (system roles) */
.ac-role:disabled {
  opacity: 0.65;
  cursor: default;
}




/* ===== BODY (PUSH PICKER TO BOTTOM) ===== */
.ac-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-end; /* 🔥 KEY PART */
  gap: 14px;
}

/* ===== PICKER ===== */
.ac-sv {
  height: 180px;
  border-radius: 10px;
  background:
    linear-gradient(to top, black, transparent),
    linear-gradient(to right, white, transparent);
}

.ac-hue {
  height: 14px;
  margin-top: 10px;
  border-radius: 999px;
  background: linear-gradient(
    to right,
    red, yellow, lime, cyan, blue, magenta, red
  );
}




.ac-sv {
  position: relative;
  touch-action: none;
}

.ac-sv-cursor {
  position: absolute;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 2px solid #fff;
  box-shadow: 0 0 0 1px rgba(0,0,0,.6);
  transform: translate(-7px, -7px);
}

.ac-hue {
  position: relative;
  touch-action: none;
}

.ac-hue-cursor {
  position: absolute;
  top: 50%;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 2px solid #fff;
  transform: translate(-8px, -50%);
}



/* ===== HEX INPUT ===== */
.ac-hex {
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px;
  font-family: monospace;
}

/* ===== FOOTER (ONLY CANCEL) ===== */
.ac-footer {
  display: flex;
  justify-content: space-between;
  margin-top: 12px;
}

.ac-cancel {
  background: transparent;
  color: var(--text-muted);
  border: none;
  font-size: 14px;
  padding: 8px 14px;
  cursor: pointer;
}

.ac-done {
  background: transparent;
  color: #4285f4;
  border: none;
  border-radius: 10px;
  padding: 8px 18px;
  font-size: 15px;
  cursor: pointer;
}






/* ===== CREATE ROLE MODAL ROOT ===== */
.create-role-modal {
  position: fixed;
  inset: 0;
  z-index: 9999;
}

/* overlay */
.crm-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.6);
}

/* modal panel — DESKTOP DEFAULT */
.crm-panel {
  position: absolute;
  inset: 0;
  margin: auto;

  width: min(420px, 92vw);
  max-height: min(520px, 90vh);

  background: rgba(34, 34, 54, 0.448);
  backdrop-filter: blur(14px);
  border: 0.9px solid var(--border);
  border-radius: 14px;
  padding: 18px;

  box-shadow: 0 20px 60px rgba(0,0,0,.5);

  display: flex;
  flex-direction: column;
  gap: 16px;
}



@media (max-width: 640px) {

 

  .crm-overlay {
    position: absolute;
    inset: 0;
    background: transparent !important;
  }
  
  .crm-panel {
    position: absolute;
    inset: 0;
    margin: auto;

    width: min(420px, 92vw);
    max-height: min(520px, 90vh);
    top: 20px;

    background: rgba(34, 34, 54, 0.448);
    backdrop-filter: blur(18px);
    border: 0.9px solid var(--border);
    border-radius: 14px;
    padding: 18px;

    box-shadow: 0 20px 60px rgba(0,0,0,.5);

    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .crm-overlay {
    background: var(--bg-surface); /* full-screen feel */
  }
}



/* header */
.crm-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.crm-header h4 {
  margin: 0;
  font-size: 16px;
}

.crm-close {
  background: transparent;
  border: none;
  font-size: 18px;
  cursor: pointer;
  color: var(--text-muted);
}

/* body */
.crm-body {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.crm-field label {
  font-size: 13px;
  color: var(--text-muted);
  display: block;
  margin-bottom: 6px;
}

.crm-field input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  color: var(--text-main);
}

/* role color row */
.crm-color-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.crm-color-preview {
  width: 32px;
  height: 32px;
  border-radius: 6px;
  background: currentColor;
  border: 1px solid var(--border);
}

.crm-color-hex {
  font-family: monospace;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px;
  width: 90px;
}

/* footer */
.crm-footer {
  display: flex;
  justify-content: flex-end;
  margin-top: 10px;
}


.crm-color-hex, .ac-hex {
  background-color: rgba(34, 34, 54, 0.566) !important;
  padding: 12px 15px !important;
  border-radius: 15px !important;
  border: 0.9px solid var(--border) !important;

}

.crm-role-name {
  background-color: rgba(34, 34, 54, 0.566) !important;
  padding: 12px 15px !important;
  border-radius: 15px !important;
  margin-bottom: 14px !important;
  border: 0.9px solid var(--border) !important;
}

.crm-role-name:focus, .crm-color-hex:focus, .ac-hex:focusa {
  border-color: #4285f4 !important;
}
 

.roles-list{
  margin-top: 40px;
  background: var(--bg-surface);
  border-radius: 20px;
  padding: 20px 6px;
  border: 1px solid var(--border);
}
</style>


<div class="roles-panel" data-community-slug="{{ community.slug }}">

  <div class="roles-header">
    <div>
      <h3>Roles</h3>
      <p>Create and manage community roles</p>
    </div>
    <button class="btn-create-role" style="display: flex; gap: 10px;">
      <svg fill="currentColor" width="14" height="14" style="position: relative; top: 1px;" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
        <path d="M228,128a12,12,0,0,1-12,12H140v76a12,12,0,0,1-24,0V140H40a12,12,0,0,1,0-24h76V40a12,12,0,0,1,24,0v76h76A12,12,0,0,1,228,128Z"/>
      </svg>
      <span>Create Role</span>
    </button>
  </div>

  <div class="roles-list"></div>

</div>
