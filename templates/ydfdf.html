<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delete Message</title>

  <style>
    :root {
      --bg: #f2f3f5;
      --card-bg: #ffffff;
      --text: #0d0d0d;
      --subtext: #676a70;
      --border: #d8d8df;
      --reply-back: #f0f0f0;
      --accent: #4285f4;
      --danger: #ff6565;
      --box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      --radius: 12px;
    }

    body.dark {
      --bg: #1e1e2f;
      --card-bg: #262738;
      --text: #ffffff;
      --subtext: #acafc2;
      --border: #33354a;
      --reply-back: #30304b;
      --danger: #ff6565;
      --box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      background: var(--bg);
    }

    /* ===============================
       OVERLAY
    =============================== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    /* ===============================
       MODAL
    =============================== */
    .delete-modal {
      width: 90%;
      max-width: 360px;
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--box-shadow);
      border: 1px solid var(--border);
      animation: popIn 0.18s ease-out;
    }

    @keyframes popIn {
      from {
        transform: scale(0.96);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* ===============================
       TEXT
    =============================== */
    .modal-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .modal-desc {
      font-size: 14px;
      color: var(--subtext);
      line-height: 1.45;
      margin-bottom: 12px;
    }

    /* ===============================
       MESSAGE PREVIEW
    =============================== */
    .delete-preview {
      background: var(--reply-back);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 16px;
      max-height: 90px;
      overflow-y: auto;
    }

    .delete-preview-text {
      font-size: 14px;
      color: var(--text);
      line-height: 1.45;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    /* ===============================
       ACTIONS
    =============================== */
    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .modal-btn {
      flex: 1;
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.15s ease, transform 0.05s ease;
    }

    .modal-btn:active {
      transform: scale(0.97);
    }

    .btn-cancel {
      background: var(--reply-back);
      color: var(--text);
    }

    .btn-cancel:hover {
      filter: brightness(0.96);
    }

    .btn-delete {
      background: var(--danger);
      color: #fff;
    }

    .btn-delete:hover {
      filter: brightness(0.92);
    }
  </style>
</head>

<body>

  <!-- ===============================
       DELETE MODAL
  =============================== -->
  <div class="modal-overlay">
    <div class="delete-modal">

      <div class="modal-title">Delete message?</div>

      <div class="modal-desc">
        Are you sure you want to delete this message?
        This action cannot be undone.
      </div>

      <!-- 🔥 MESSAGE PREVIEW -->
      <div class="delete-preview">
        <div class="delete-preview-text">
          *Yes bro*, this message will be **deleted permanently** 😬
        </div>
      </div>

      <div class="modal-actions">
        <button class="modal-btn btn-cancel">Cancel</button>
        <button class="modal-btn btn-delete">Delete</button>
      </div>

    </div>
  </div>

</body>
</html>
