<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Join Button</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>

/* Make both containers same width */
.outer-box,
.popup-container {
    width: 100% !important;
    box-sizing: border-box;
}
 @media (max-width: 991px){

.outer-box,
.popup-container {
    width: 100% !important;
    box-sizing: border-box !important;
}
 }
/* Outer container */
.outer-box {
    position: relative;
    border: 1.5px solid rgba(255, 255, 255, 0.2);
    border-radius: 20px;
    padding: 50px 20px 20px;
}

/* Floating label above */
.dislabel {
    position: absolute;
    top: -16px;
    left: 20px;
    background: var(--sub-accent);
    color: white;
    font-size: 14px;
    padding: 6px 16px;
    border-radius: 50px;
    display: flex;
    align-items: center;
    font-weight: bold;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}

.dislabel i {
    margin-right: 6px;
}

/* Join button */
.discordjoin-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: linear-gradient(90deg, var(--sub-accent), #4752C4);
    color: white;
    font-size: 16px;
    font-weight: bold;
    border-radius: 20px;
    padding: 18px;
    text-decoration: none;
    transition: background 0.3s ease;
}

.discordjoin-btn:hover {
    background: linear-gradient(90deg, #4752C4, #3641A7);
}

/* Popup container */
.popup-container {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 18px;
    padding: 20px 20px 30px;
    position: relative;
    color: white;
}

/* Upward arrow above container */
.popup-container::before {
    content: "";
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-bottom: 12px solid #222;
}

.popup-header {
    display: flex;
    align-items: center;
    font-weight: 700;
    font-size: 1.1rem;
    margin-bottom: 16px;
    gap: 10px;
}

.popup-header .discordicon {
    background: #2e65ff;
    padding: 6px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.popup-header .discordicon i {
    color: white;
    font-size: 18px;
}

.popup-actions {
    margin-left: auto;
    display: flex;
    gap: 15px;
}

.popup-actions button {
    background: transparent;
    border: none;
    cursor: pointer;
    color: #ccc;
    font-size: 18px;
}

.popup-actions button:hover {
    color: white;
}

.ranking_up-label {
   font-size: 0.7rem;
    margin-top: 23px;
    display: block;
    margin-bottom: 6px;
}

#discordlinkInput {
    width: 90%;
    padding: 10px 14px;
    border-radius: 14px;
    margin-left: 6px;
    border: 1.5px solid #555;
    background: #121212;
    color: white;
    font-size: 1rem;
}



input[type="text"]:focus {
    outline-color: #2e65ff;
    border-color: #2e65ff;
}

input[type="text"].error {
    border-color: #ff3b3b;
}

.error-message {
    color: #ff3b3b;
    font-size: 0.85rem;
    margin-top: 6px;
    font-weight: 600;
}


.liners {
    height: 0.5px;
    background-color: #2e65ff;
    border-radius: 1px;
    margin: 8px -20px; /* matches container's horizontal padding */
}

.discordCircle {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background-color: #5865F2; /* blue circle always visible */
  margin: 10px auto;
  position: relative;
  overflow: hidden;
}

.discordCircle img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  position: absolute;
  top: 0;
  left: 0;
  display: none; /* hide image by default */
}

.discordFallback {
  width: 100%;
  height: 100%;
  display: none;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: bold;
  font-size: 20px;
  position: absolute;
  top: 0;
  left: 0;
}

</style>
</head>
<body>
<div style="outline: none; display: flex; justify-content: center; align-items: center;  flex-direction: column;">

<div class="outer-box" data-type="discord">
  
  <div class="dislabel" style="gap: 10px; display: flex;">

</svg> Join the server 
  </a>
</div>


<div class="popup-container" role="dialog" aria-label="Visit link">
  <div class="popup-header">
    <div class="discordicon">
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-discord" viewBox="0 0 24 24">
  <path d="M20.318 4.36a19.8 19.8 0 0 0-4.885-1.517.075.075 0 0 0-.078.038c-.212.375-.445.866-.609 1.25a18.3 18.3 0 0 0-5.487 0 12 12 0 0 0-.618-1.25.075.075 0 0 0-.078-.038 19.9 19.9 0 0 0-4.885 1.517.06.06 0 0 0-.031.027C.534 9.036-.32 13.57.1 18.048q.005.033.032.056a19.9 19.9 0 0 0 5.992 3.03.075.075 0 0 0 .084-.028q.695-.945 1.227-1.994a.075.075 0 0 0-.016-.089l-.027-.017a13.5 13.5 0 0 1-1.872-.892.075.075 0 0 1-.03-.1l.022-.028q.191-.143.372-.292a.075.075 0 0 1 .077-.01c3.928 1.794 8.181 1.794 12.062 0a.075.075 0 0 1 .08.01q.181.149.372.292a.075.075 0 0 1-.006.127 12 12 0 0 1-1.873.891.075.075 0 0 0-.045.045.075.075 0 0 0 .004.062c.36.697.773 1.363 1.226 1.994a.075.075 0 0 0 .084.028 19.8 19.8 0 0 0 6.001-3.03.075.075 0 0 0 .032-.056c.501-5.176-.839-9.673-3.55-13.658a.045.045 0 0 0-.03-.029m-12.297 10.96c-1.184 0-2.157-1.085-2.157-2.419s.956-2.419 2.157-2.419c1.21 0 2.176 1.095 2.157 2.419 0 1.333-.956 2.419-2.157 2.419m7.974 0c-1.183 0-2.157-1.085-2.157-2.419s.956-2.419 2.157-2.419c1.21 0 2.177 1.095 2.157 2.419 0 1.333-.947 2.419-2.157 2.419"/>
</svg>
    </div>
    <div class="title">Discord</div>
    <div class="liner"></div>
    <div class="popup-actions">
      <button title="Copy link">
        <i class="far fa-clipboard"></i>
      </button>
      <button title="Delete link">
        <i class="fas fa-trash-alt"></i>
      </button>

  </div>
  <div class="liners"></div>
  <label class="linkInput ranking_up-label" for="linkInput">Link you want your users to visit</label>
  <input name="discord_link" class="discordlinkInput error"  id="discordlinkInput" type="text" placeholder="https://" />
  <div class="discorderrorMessage error-message">Invalid url</div>
</div>
</div>
<script>
  
(root => {
  const discordJoinBtn = root.querySelector(".discordjoin-btn");
  const discordInput = root.querySelector(".discordlinkInput");
  const discordCircleImg = root.querySelector(".discordCircleImg");
  const discordFallback = root.querySelector(".discordFallback");
  const discordErrorMessage = root.querySelector(".discorderrorMessage");

  function extractDiscordInvite(url) {
    const match = url.match(/discord\.gg\/([a-zA-Z0-9]+)/i);
    return match ? match[1] : null;
  }

  async function fetchDiscordInfo(invite) {
    try {
      const res = await fetch(`/api/discord_info?invite=${encodeURIComponent(invite)}`);
      const data = await res.json();
      if (!res.ok) {
        console.error("Discord API error:", data.error);
        return null;
      }
      return data;
    } catch (err) {
      console.error("Error fetching Discord info:", err);
      return null;
    }
  }

  async function updateDiscordUI(url) {
    const invite = extractDiscordInvite(url);

    // Reset UI
    discordCircleImg.style.display = "none";
    discordFallback.style.display = "none";
    discordJoinBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-discord" viewBox="0 0 24 24">

</svg> Join server`;
    discordErrorMessage.style.display = "none";

    if (!invite) {
      if (url.length > 0) discordErrorMessage.style.display = "block";
      return;
    }
P
  }

  // Restore saved config if exists
  if (window.config && config.discord) {
    discordInput.value = config.discord.link || "";
    if (config.discord.name) {
      discordJoinBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-discord" viewBox="0 0 24 24">
  <path d="M20.318 4.36a19.8 19.8 0 0 0-4.885-1.517.075.075 0 0 0-.078.038c-.212.375-.445.866-.609 1.25a18.3 18.3 0 0 0-5.487 0 12 12 0 0 0-.618-1.25.075.075 0 0 0-.078-.038 19.9 19.9 0 0 0-4.885 1.517.06.06 0 0 0-.031.027C.534 9.036-.32 13.57.1 18.048q.005.033.032.056a19.9 19.9 0 0 0 5.992 3.03.075.075 0 0 0 .084-.028q.695-.945 1.227-1.994a.075.075 0 0 0-.016-.089l-.027-.017a13.5 13.5 0 0 1-1.872-.892.075.075 0 0 1-.03-.1l.022-.028q.191-.143.372-.292a.075.075 0 0 1 .077-.01c3.928 1.794 8.181 1.794 12.062 0a.075.075 0 0 1 .08.01q.181.149.372.292a.075.075 0 0 1-.006.127 12 12 0 0 1-1.873.891.075.075 0 0 0-.045.045.075.075 0 0 0 .004.062c.36.697.773 1.363 1.226 1.994a.075.075 0 0 0 .084.028 19.8 19.8 0 0 0 6.001-3.03.075.075 0 0 0 .032-.056c.501-5.176-.839-9.673-3.55-13.658a.045.045 0 0 0-.03-.029m-12.297 10.96c-1.184 0-2.157-1.085-2.157-2.419s.956-2.419 2.157-2.419c1.21 0 2.176 1.095 2.157 2.419 0 1.333-.956 2.419-2.157 2.419m7.974 0c-1.183 0-2.157-1.085-2.157-2.419s.956-2.419 2.157-2.419c1.21 0 2.177 1.095 2.157 2.419 0 1.333-.947 2.419-2.157 2.419"/>
</svg> Join ${config.discord.name}`;
    }
    if (config.discord.icon) {
      discordCircleImg.src = config.discord.icon;
      discordCircleImg.style.display = "block";
    } else if (config.discord.name) {
      discordFallback.textContent = config.discord.name.charAt(0).toUpperCase();
      discordFallback.style.display = "flex";
    }
  }

  // Update UI dynamically when input changes
  discordInput.addEventListener("input", () => updateDiscordUI(discordInput.value.trim()));

  // Click join button
  discordJoinBtn.addEventListener("click", e => {
    e.preventDefault();
    const invite = extractDiscordInvite(discordInput.value.trim());
    if (invite) {
      window.open(`https://discord.gg/${invite}`, "_blank");
    }
  });
})(root);


</script>
