<style>
  /* ================================
    STATS TABLE
  ================================ */
  .stats-table{
    width: 100%;
    background: linear-gradient(180deg, var(--bg-surface), var(--bg-app-others));
    border-radius: 20px;
    padding: 30px 12px;
    box-shadow: 
      0 8px 20px rgba(0,0,0,0.45),
      inset 0 0 0 1px var(--border);
    font-family: 'Outfit', sans-serif;
    color: var(--text-main);
    position: relative;
    overflow: hidden;
  }

  .stats-table::before{
    content:"";
    position:absolute;
    inset:0;
    background: radial-gradient(circle at top, rgba(88,101,242,0.12), transparent 60%);
    pointer-events:none;
  }

  /* ================================
    STAT ROW
  ================================ */
  .stat-row{
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, var(--bg-surface-active), var(--bg-surface-in-active));
    padding: 13px 14px;           
    border-radius: 17px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .stat-row::after{
    content:"";
    position:absolute;
    left:-40%;
    top:0;
    width:40%;
    height:100%;
    background: linear-gradient(120deg, transparent, rgba(66,133,244,0.18), transparent);
    transition: 0.6s;
  }

  .stat-row:hover::after{
    left:100%;
  }

  .stat-row:hover{
    transform: translateY(-2px) scale(1.004);
    background: linear-gradient(180deg, var(--bg-hover), var(--bg-surface));
    box-shadow: 
      0 6px 18px rgba(0,0,0,0.45),
      0 0 0 1px var(--bg-active-border),
      0 0 14px rgba(66,133,244,0.22);
  }

  /* ================================
    LABEL
  ================================ */
  .stat-label{
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.2px;
    color: var(--text-main-items);
    text-transform: uppercase;
  }

  /* ================================
    PLAIN TEXT VALUES
  ================================ */
  .stat-value.plain{
    font-size: 13px;
    font-weight: 600;
    color: var(--text-main);
    background: none;
    padding: 0;
    border-radius: 0;
    box-shadow: none;
    border: none;
    text-shadow: none;
  }

  /* ================================
    SUCCESS RATE BADGE BASE
  ================================ */
  .stat-value.rate-badge{
    font-size: 12.5px;
    font-weight: 700;
    color: white;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.12);
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    box-shadow: 
      0 4px 10px rgba(0,0,0,0.35),
      inset 0 0 6px rgba(255,255,255,0.12);
  }

  /* ================================
    BADGE COLOR STATES (ONLY BADGE)
  ================================ */

  /* none */
  .success-rate-row.rate-none .rate-badge{
    background: linear-gradient(135deg, #6b7280, #4b5563);
  }

  /* 0–20% red */
  .success-rate-row.rate-low .rate-badge{
    background: #e73d3dd6;
  }

  /* 21–50% yellow */
  .success-rate-row.rate-mid .rate-badge{
    background: linear-gradient(135deg, #f59e0b, #b45309);
  }

  /* 51–70% yellow-green */
  .success-rate-row.rate-good .rate-badge{
    background: linear-gradient(135deg, #84cc16, #4d7c0f);
  }

  /* 71–100% green */
  .success-rate-row.rate-high .rate-badge{
    background: linear-gradient(135deg, #22c55e, #15803d);
  }

  /* ================================
    INFO CARD
  ================================ */
  .hushby{
    margin-top: 12px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 15px 14px;
    font-family: 'Outfit', sans-serif;
    color: var(--text-main-items);
    font-size: 12.5px;
    line-height: 1.5;
    box-shadow: 0 6px 16px rgba(0,0,0,0.35);
    font-weight: 500;
  }

  /* ================================
    ENTRY BADGE
  ================================ */
  .entry{
    display: inline-block;
    margin-top: 6px;
    padding: 4px 10px;
    font-size: 11.5px;
    font-weight: 600;
    border-radius: 999px;
    background: var(--bg-hover);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
</style>

<div style="display: flex; flex-direction: column; width: 100%;">
  <div class="stats-table">

    <!-- Submissions (plain text) -->
    <div class="stat-row">
      <span class="stat-label">Submissions</span>
      <span class="stat-value plain">{{ total_attempts|default(0) }}</span>
    </div>

    <!-- Success (plain text) -->
    <div class="stat-row">
      <span class="stat-label">Success</span>
      <span class="stat-value plain">{{ total_success|default(0) }}</span> 
    </div>

    <!-- Success Rate (ONLY BADGE COLORED) -->
    <div class="stat-row success-rate-row {{ 'rate-' ~ success_band if has_submissions else 'rate-none' }}">
      <span class="stat-label">Success rate</span>
      <span class="stat-value rate-badge">
        {{ success_rate|default(0) }}%
      </span>
    </div>

  </div>

  <div class="hushby">
    No one has completed this quest yet.<br>
    <span class="entry">Results will appear here</span>
  </div>
</div>
