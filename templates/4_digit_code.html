  }

    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-bottom: 18px;

  .nester:hover {

    box-shadow: 0 6px 18px var(--accent-45);
  }

  .nester:active {

    background: rgba(231, 76, 60, 0.08);

  ::selection {

    color: var(--text-main);        
  }


  @keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    50% { transform: translateX(4px); }
    75% { transform: translateX(-4px); }
    100% { transform: translateX(0); }

  .resend-status {

  }

  .resend-status.show {

  .resend-status svg{
    width: 13px;
    height: 13px;
    fill: currentColor;
    position: relative;
  }

  .resend-status.sent {
    color: #4ade80;
  }

  .resend-status.wait {

  <div class="container">             

  <h1 class="pickmy">OTP Verification</h1>
    <p>Please enter the 4-digit code sent to  <u class="fire-pee">{{ email }}.</u> </p>
    
    <form onsubmit="return false;">
       <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      
      <div id="resendStatus" class="resend-status"></div>
      
      <div class="code-boxes" style="border: none;">
        <input name="digit1" class="code-input" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" style="outline: none !important;" required>
        <input name="digit2" maxlength="1" class="code-input" inputmode="numeric" pattern="[0-9]*" style="outline: none !important;" required>
        <input name="digit3" maxlength="1" class="code-input" inputmode="numeric" pattern="[0-9]*" style="outline: none !important;" required>
        <input name="digit4" maxlength="1" class="code-input" inputmode="numeric" pattern="[0-9]*" style="outline: none !important;" required>
        <input name="digit5" maxlength="1" class="code-input" inputmode="numeric" pattern="[0-9]*" style="outline: none !important;" required>
        <input name="digit6" maxlength="1" class="code-input" inputmode="numeric" pattern="[0-9]*" style="outline: none !important;" required>
      </div>
      
    </form>


    <span class="resend-line">
        Didn't recieved a code?
        <div id="resendBtn" class="resend_link" style="cursor: pointer; ">Resend</div>

    </span>


  <label class="terms-label">
    By continuing, you acknowledge you've read and agreed to our
    <a href="{{ url_for('terms') }}" target="_blank" class="link-terms">Terms of Service</a> &
    <a href="{{ url_for('privacy') }}" target="_blank" class="link-terms">Privacy Policy</a>
